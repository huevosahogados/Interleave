// ── Practice session ─────────────────────────────────────────────────────────
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

// Expand items by tier: -1 → 1 copy, 0 → 2 copies, +1 → 4 copies
// Returns a flat array where higher-tier items appear proportionally more often
function tierExpand(all) {
  const out = [];
  for (const item of all) {
    const t = item.tier || 0;
    const copies = t === 1 ? 4 : t === -1 ? 1 : 2;
    for (let i = 0; i < copies; i++) out.push(item);
  }
  return out;
}

// Shuffle avoiding consecutive duplicates (by id)
function shuffleNoConsecutive(arr) {
  for (let attempt = 0; attempt < 50; attempt++) {
    const s = shuffle(arr);
    let ok = true;
    for (let i = 1; i < s.length; i++) {
      if (s[i].id === s[i-1].id) { ok = false; break; }
    }
    if (ok) return s;
  }
  // fallback: best effort — swap consecutive dupes
  const s = shuffle(arr);
  for (let i = 1; i < s.length; i++) {
    if (s[i].id === s[i-1].id) {
      for (let j = i+1; j < s.length; j++) {
        if (s[j].id !== s[i].id && (j+1 >= s.length || s[j+1]?.id !== s[i-1].id)) {
          [s[i], s[j]] = [s[j], s[i]];
          break;
        }
      }
    }
  }
  return s;
}

// Shuffle per loop — reshuffle at each loop boundary, avoid same item at seams
function buildShufflePerLoopQueue(all, numLoops) {
  const q = [];
  for (let loop = 0; loop < numLoops; loop++) {
    let loopArr = shuffle(all);
    // avoid seam: last item of previous loop = first item of this loop
    if (q.length > 0 && loopArr.length > 1) {
      const lastId = q[q.length - 1].id;
      if (loopArr[0].id === lastId) {
        // swap first with a random later position
        const swapIdx = 1 + Math.floor(Math.random() * (loopArr.length - 1));
        [loopArr[0], loopArr[swapIdx]] = [loopArr[swapIdx], loopArr[0]];
      }
    }
    q.push(...loopArr);
  }
  return q;
}

// Full shuffle — all items × numLoops, shuffled with no consecutive duplicates
function buildFullShuffleQueue(all, numLoops) {
  const expanded = [];
  for (let i = 0; i < numLoops; i++) expanded.push(...all);
  return shuffleNoConsecutive(expanded);
}

let maxLoops = 3;
let isIndefinite = false;
let currentLoop = 0;
let itemsPerLoop = 0;
let poolSizePerLoop = 0;

function startSession() {
  if (!items.length && !groups.length) return;
  saveAnnotation();
  itemsSinceRest = 0;
  loopCount = 0;
  currentLoop = 0;
  timerTotal = parseInt(document.getElementById('timer-input').value) || 120;
  maxLoops = parseInt(document.getElementById('loop-count').value) || 3;
  isIndefinite = document.getElementById('loop-indefinite').checked;
  const all = allLibraryItems();

  if (orderMode === 'manual') {
    // manual: repeat the same order for each loop
    queue = [];
    const loops = isIndefinite ? 1 : maxLoops;
    for (let i = 0; i < loops; i++) queue.push(...all);
    itemsPerLoop = all.length;
    poolSizePerLoop = all.length;
  } else {
    const mode = document.getElementById('random-mode').value;
    const loops = isIndefinite ? 1 : maxLoops;
    const pool = tierExpand(all);
    itemsPerLoop = all.length;
    poolSizePerLoop = pool.length;
    if (mode === 'full-shuffle') {
      queue = buildFullShuffleQueue(pool, loops);
    } else {
      queue = buildShufflePerLoopQueue(pool, loops);
    }
  }

  qIdx = 0;
  groupPageIdx = 0;
  document.getElementById('practice-screen').classList.add('show');
  initToolbarDrag();
  showPracticeItem();
}

function currentPracticeItem() {
  const entry = queue[qIdx];
  if (!entry) return null;
  if (entry._type === 'group') {
    if (!entry.itemIds || !entry.itemIds.length) return null;
    const id = entry.itemIds[groupPageIdx];
    return items.find(x => x.id === id) || null;
  }
  return items.find(x => x.id === entry.id) || entry;
}

function showPracticeItem() {
  const entry = queue[qIdx];
  if (!entry) return;
  groupPageIdx = 0;
  const isGroup = entry._type === 'group';
  document.getElementById('p-title').textContent = entry.name;
  const loopNum = poolSizePerLoop > 0 ? Math.floor(qIdx / poolSizePerLoop) + 1 : 1;
  const posInLoop = poolSizePerLoop > 0 ? (qIdx % poolSizePerLoop) + 1 : qIdx + 1;
  const loopLabel = isIndefinite ? 'loop ' + loopNum : 'loop ' + loopNum + '/' + maxLoops;
  document.getElementById('p-counter').textContent = posInLoop + '/' + itemsPerLoop + '  ' + loopLabel;
  // tap zones — only for groups
  document.getElementById('tap-prev').classList.toggle('active', isGroup);
  document.getElementById('tap-next').classList.toggle('active', isGroup);
  renderPracticeImage();
  const w = entry.weight || 1;
  const sel = document.getElementById('pw-select');
  if (sel) sel.value = w;
  updateTierButtons(entry.tier || 0);
  startTimer();
}

function renderPracticeImage() {
  const item = currentPracticeItem();
  if (!item) return;
  const entry = queue[qIdx];
  const isGroup = entry._type === 'group';
  const counter = document.getElementById('p-page-counter');
  if (isGroup) {
    counter.textContent = (groupPageIdx+1) + ' / ' + entry.itemIds.length;
  } else {
    counter.textContent = '';
  }
  const img = document.getElementById('p-img');
  const ac = document.getElementById('p-annotation');
  // clear annotation immediately
  ac.getContext('2d').clearRect(0, 0, ac.width, ac.height);
  // force reload even if src is same object reference
  img.src = '';
  img.onload = () => renderPAnnotation(item);
  img.src = item.src;
}

function prevPage() {
  const entry = queue[qIdx];
  if (!entry) return;
  if (entry._type !== 'group' || !entry.itemIds) return;
  if (groupPageIdx > 0) { groupPageIdx--; renderPracticeImage(); }
}

function nextPage() {
  const entry = queue[qIdx];
  if (!entry) return;
  if (entry._type !== 'group' || !entry.itemIds) return;
  if (groupPageIdx < entry.itemIds.length - 1) { groupPageIdx++; renderPracticeImage(); }
}

function renderPAnnotation(item) {
  const wrap = document.getElementById('p-img-wrap');
  const img  = document.getElementById('p-img');
  const ac   = document.getElementById('p-annotation');
  const w = img.offsetWidth, h = img.offsetHeight;
  ac.width = w; ac.height = h;
  ac.style.left = img.offsetLeft + 'px';
  ac.style.top  = img.offsetTop + 'px';
  if (item.annotation) {
    const i = new Image();
    i.onload = () => ac.getContext('2d').drawImage(i, 0, 0, w, h);
    i.src = item.annotation;
  }
}

}
let timerEndAt = 0; // wall-clock ms when timer expires

function startTimer() {
  clearInterval(timerTick);
  isPaused = false;
  const pauseBtn = document.getElementById('p-pause');
  const overlay = document.getElementById('p-pause-overlay');
  if (pauseBtn) { pauseBtn.classList.remove('paused'); }
  if (overlay) overlay.classList.remove('show');
  const base = parseInt(document.getElementById('timer-input').value) || 120;
  const entry = queue[qIdx];
  const w = (entry && entry.weight) || 1;
  timerTotal = base * w;
  timerEndAt = Date.now() + timerTotal * 1000;
  timerLeft = timerTotal;
  updateTimerDisplay();
  timerTick = setInterval(() => {
    timerLeft = Math.max(0, Math.ceil((timerEndAt - Date.now()) / 1000));
    updateTimerDisplay();
    if (timerLeft <= 0) nextItem();
  }, 250);
}

function updateTimerDisplay() {
  const m = Math.floor(timerLeft/60).toString().padStart(2,'0');
  const s = (timerLeft%60).toString().padStart(2,'0');
  document.getElementById('p-timer').textContent = m+':'+s;
  const pct = Math.max(0, timerLeft / timerTotal * 100);
  document.getElementById('p-progress-bar').style.width = pct + '%';
  document.getElementById('p-timer').style.color = timerLeft <= 10 ? '#ffaaaa' : 'rgba(255,255,255,0.9)';
}

function nextItem() {
  clearInterval(timerTick);
  incrementSession(queue[qIdx]);
  if (metroRunning) stopMetronome();

  // Check if we've completed a loop
  if (poolSizePerLoop > 0 && (qIdx + 1) % poolSizePerLoop === 0) {
    currentLoop++;
    toast('Loop ' + currentLoop + ' complete');
    // Check if session is done
    if (!isIndefinite && currentLoop >= maxLoops) {
      toast('Session complete!');
      setTimeout(() => endSession(), 1500);
      return;
    }
    // In indefinite mode, append another loop to the queue
    if (isIndefinite) {
      const all = allLibraryItems();
      const pool = tierExpand(all);
      const mode = document.getElementById('random-mode').value;
      if (orderMode === 'manual') {
        queue.push(...all);
      } else if (mode === 'full-shuffle') {
        let next = shuffle(pool);
        if (queue.length > 0 && next[0].id === queue[queue.length - 1].id && next.length > 1) {
          const si = 1 + Math.floor(Math.random() * (next.length - 1));
          [next[0], next[si]] = [next[si], next[0]];
        }
        queue.push(...next);
      } else {
        let next = shuffle(pool);
        if (queue.length > 0 && next[0].id === queue[queue.length - 1].id && next.length > 1) {
          const si = 1 + Math.floor(Math.random() * (next.length - 1));
          [next[0], next[si]] = [next[si], next[0]];
        }
        queue.push(...next);
      }
    }
  }

  // advance
  qIdx++;
  itemsSinceRest++;
  if (shouldRest()) { startRest(); return; }
  showPracticeItem();
  startTimer();
}

function prevItem() {
  clearInterval(timerTick);
  if (qIdx > 0) { qIdx--; showPracticeItem(); }
}

function skipItem() {
  clearInterval(timerTick);
  if (qIdx < queue.length - 1) { qIdx++; showPracticeItem(); }
}

let loopCount = 0;

function incrementSession(item) {
  item.sessions = (item.sessions || 0) + 1;
  const orig = items.find(i => i.id === item.id);
  if (orig) { orig.sessions = item.sessions; dbPut(orig); }
  renderSidebar();
}

function endSession() {
  clearInterval(timerTick);
  clearInterval(restTimerTick);
  clearInterval(breatheTick);
  isPaused = false;
  loopCount = 0;
  itemsSinceRest = 0;
  if (metroRunning) stopMetronome();

}

// ── Image cleanup (binarization) ─────────────────────────────────────────────
let cleanupOriginalSrc = null;
let cleanupPreviewSrc = null;

function otsuThreshold(data) {
  const hist = new Array(256).fill(0);
  for (let i = 0; i < data.length; i += 4) {
    const grey = Math.round(0.299 * data[i] + 0.587 * data[i+1] + 0.114 * data[i+2]);
    hist[grey]++;
  }
  const total = data.length / 4;
  let sum = 0;
  for (let i = 0; i < 256; i++) sum += i * hist[i];
  let sumB = 0, wB = 0, max = 0, threshold = 128;
  for (let t = 0; t < 256; t++) {
    wB += hist[t];
    if (!wB) continue;
    const wF = total - wB;
    if (!wF) break;
    sumB += t * hist[t];
    const mB = sumB / wB;
    const mF = (sum - sumB) / wF;
    const between = wB * wF * (mB - mF) ** 2;
    if (between > max) { max = between; threshold = t; }
  }
  return threshold;
}

function binarizeImage(src, threshold) {
  return new Promise(res => {
    const img = new Image();
    img.onload = () => {
      const c = document.createElement('canvas');
      c.width = img.width; c.height = img.height;
      const ctx = c.getContext('2d');
      ctx.drawImage(img, 0, 0);
      const imageData = ctx.getImageData(0, 0, c.width, c.height);
      const d = imageData.data;
      for (let i = 0; i < d.length; i += 4) {
        const grey = Math.round(0.299 * d[i] + 0.587 * d[i+1] + 0.114 * d[i+2]);
        const val = grey < threshold ? 0 : 255;
        d[i] = d[i+1] = d[i+2] = val;
        d[i+3] = 255;
      }
      ctx.putImageData(imageData, 0, 0);
      res(c.toDataURL('image/jpeg', 0.92));
    };
    img.src = src;
  });
}

async function previewCleanup() {
  const item = getActiveItem();
  if (!item) return;
  cleanupOriginalSrc = item.src;
  // calculate Otsu threshold from original
  const img = new Image();
  await new Promise(res => { img.onload = res; img.src = item.src; });
  const c = document.createElement('canvas');
  c.width = img.width; c.height = img.height;
  const ctx = c.getContext('2d');
  ctx.drawImage(img, 0, 0);
  const data = ctx.getImageData(0, 0, c.width, c.height).data;
  const t = otsuThreshold(data);
  document.getElementById('threshold-slider').value = t;
  document.getElementById('threshold-val').textContent = t;
  document.getElementById('cleanup-normal').style.display = 'none';
  document.getElementById('cleanup-preview').style.display = 'flex';
  await applyPreview(t);
}

async function applyPreview(threshold) {
  if (!cleanupOriginalSrc) return;
  showLoading('Processing…');
  await yieldFrame();
  cleanupPreviewSrc = await binarizeImage(cleanupOriginalSrc, threshold);
  sheetImg.src = cleanupPreviewSrc;
  hideLoading();
}

}

}

// ── Export / Import ───────────────────────────────────────────────────────────
async function exportLibrary() {
  const allItems = await dbGetAll();
  const allGroups = await dbGetAllGroups();
  const payload = {
    version: 1,
    exported: new Date().toISOString(),
    items: allItems,
    groups: allGroups
  };
  const json = JSON.stringify(payload);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const date = new Date().toISOString().slice(0,10);
  a.href = url;
  a.download = `interleave-${date}.json`;
  a.click();
  URL.revokeObjectURL(url);
  toast('Exported ' + allItems.length + ' items');
}

document.getElementById('import-input').addEventListener('change', async e => {
  const file = e.target.files[0];
  if (!file) return;
  e.target.value = '';
  let payload;
  try {
    const text = await file.text();
    payload = JSON.parse(text);
  } catch {
    alert("Could not read file — make sure it's an Interleaves export (.json).");
    return;
  }
  if (!payload.items || !Array.isArray(payload.items)) {
    alert('Invalid export file.');
    return;
  }
  const incoming = payload.items.length;
  const incomingGroups = (payload.groups || []).length;
  const msg = `Import ${incoming} item${incoming!==1?'s':''} and ${incomingGroups} group${incomingGroups!==1?'s':''}?\n\nThis will MERGE with your existing library (existing items are kept, duplicates by ID are overwritten).`;
  if (!confirm(msg)) return;
  showLoading('Importing…');
  await yieldFrame();
  for (const item of payload.items) {
    await dbPut(item);
    if (!items.find(i => i.id === item.id)) items.push(item);
    else Object.assign(items.find(i => i.id === item.id), item);
  }
  for (const g of (payload.groups || [])) {
    await dbPutGroup(g);
    if (!groups.find(x => x.id === g.id)) groups.push(g);
    else Object.assign(groups.find(x => x.id === g.id), g);
  }
  items.sort((a,b) => (a.order||0)-(b.order||0));
  groups.sort((a,b) => (a.order||0)-(b.order||0));
  hideLoading();
  renderSidebar();
  toast('Imported ' + incoming + ' items');
});

// ── Metronome ─────────────────────────────────────────────────────────────────
let metroAudioCtx = null;
let metroBPM = 120;
let metroBeatsPerBar = 4;
let metroBeatUnit = 4; // denominator
let metroRunning = false;
let metroCurrentBeat = 0;
let metroNextNoteTime = 0;
let metroScheduleTimer = null;
const METRO_LOOKAHEAD = 0.1;   // seconds to schedule ahead
const METRO_INTERVAL = 25;      // ms between scheduler checks
const METRO_MIN_BPM = 40;
const METRO_MAX_BPM = 208;

function toggleMetronomePanel() {
  const panel = document.getElementById('metro-panel');
  panel.classList.toggle('show');
}

// Metro panel drag
(function initMetroPanelDrag() {
  let dragging = false, startX, startY, origLeft, origTop;

  function getPanel() { return document.getElementById('metro-panel'); }

  function startDrag(e) {
    const header = document.getElementById('metro-header');
    const src = e.touches ? e.touches[0] : e;
    if (!header.contains(e.target)) return;
    // ignore close button and BPM input
    if (e.target.closest('#metro-close') || e.target.closest('#metro-bpm')) return;
    e.preventDefault();
    dragging = true;
    const panel = getPanel();
    const rect = panel.getBoundingClientRect();
    // switch to fixed top/left positioning
    panel.style.bottom = 'auto';
    panel.style.right = 'auto';
    panel.style.left = rect.left + 'px';
    panel.style.top = rect.top + 'px';
    origLeft = rect.left;
    origTop = rect.top;
    startX = src.clientX;
    startY = src.clientY;
  }

  function moveDrag(e) {
    if (!dragging) return;
    e.preventDefault();
    const src = e.touches ? e.touches[0] : e;
    const panel = getPanel();
    const pw = panel.offsetWidth;
    const ph = panel.offsetHeight;
    const newLeft = Math.max(0, Math.min(origLeft + src.clientX - startX, window.innerWidth - pw));
    const newTop = Math.max(0, Math.min(origTop + src.clientY - startY, window.innerHeight - ph));
    panel.style.left = newLeft + 'px';
    panel.style.top = newTop + 'px';
  }

  function endDrag() { dragging = false; }

  document.addEventListener('mousedown', startDrag);
  document.addEventListener('mousemove', moveDrag);
  document.addEventListener('mouseup', endDrag);
  document.addEventListener('touchstart', startDrag, { passive: false });
  document.addEventListener('touchmove', moveDrag, { passive: false });
  document.addEventListener('touchend', endDrag);
})();

function getMetroAudioCtx() {
  if (!metroAudioCtx) metroAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (metroAudioCtx.state === 'suspended') metroAudioCtx.resume();
  return metroAudioCtx;
}

function scheduleMetroBeat(beatNum, time) {
  const ctx = getMetroAudioCtx();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain);
  gain.connect(ctx.destination);
  const isBeat1 = !metroFreeClick && beatNum === 0;
  const isAccent = !metroFreeClick && !isBeat1 && (metroAccents[beatNum] || false);

  if (isBeat1) {
    // beat 1: descending chime — high to low, fuller sound
    osc.type = 'sine';
    osc.frequency.setValueAtTime(1480, time);
    osc.frequency.exponentialRampToValueAtTime(740, time + 0.06);
    gain.gain.setValueAtTime(0.7, time);
    gain.gain.exponentialRampToValueAtTime(0.001, time + 0.12);
    osc.start(time);
    osc.stop(time + 0.13);
    // add a second partial for richness
    const osc2 = ctx.createOscillator();
    const gain2 = ctx.createGain();
    osc2.connect(gain2); gain2.connect(ctx.destination);
    osc2.type = 'sine';
    osc2.frequency.setValueAtTime(2220, time);
    osc2.frequency.exponentialRampToValueAtTime(1110, time + 0.04);
    gain2.gain.setValueAtTime(0.25, time);
    gain2.gain.exponentialRampToValueAtTime(0.001, time + 0.06);
    osc2.start(time); osc2.stop(time + 0.07);
  } else if (isAccent) {
    // accent: mid tone, shorter
    osc.type = 'sine';
    osc.frequency.setValueAtTime(1100, time);
    osc.frequency.exponentialRampToValueAtTime(880, time + 0.03);
    gain.gain.setValueAtTime(0.45, time);
    gain.gain.exponentialRampToValueAtTime(0.001, time + 0.06);
    osc.start(time);
    osc.stop(time + 0.07);
  } else {
    // plain click
    osc.type = 'sine';
    osc.frequency.setValueAtTime(880, time);
    gain.gain.setValueAtTime(0.3, time);
    gain.gain.exponentialRampToValueAtTime(0.001, time + 0.04);
    osc.start(time);
    osc.stop(time + 0.05);
  }
  const delay = Math.max(0, (time - ctx.currentTime) * 1000);
  setTimeout(() => flashMetroBeat(beatNum, isBeat1, isAccent), delay);
}

function flashMetroBeat(beatNum, isBeat1, isAccent) {
  const strong = document.getElementById('metro-light-strong');
  const weak = document.getElementById('metro-light-weak');
  if (strong) {
    if (isBeat1) { strong.classList.add('on'); setTimeout(() => strong.classList.remove('on'), 120); }
    else strong.classList.remove('on');
  }
  if (weak) {
    if (isAccent) { weak.classList.add('on'); setTimeout(() => weak.classList.remove('on'), 100); }
    else weak.classList.remove('on');
  }
  // pulse the accent dot — skip on e-ink
  if (!document.documentElement.classList.contains('eink')) {
    const dots = document.querySelectorAll('.metro-accent-btn');
    if (dots[beatNum]) {
      dots[beatNum].style.opacity = '0.4';
      setTimeout(() => { if (dots[beatNum]) dots[beatNum].style.opacity = ''; }, 100);
    }
  }
}

function metroScheduler() {
  const ctx = getMetroAudioCtx();
  while (metroNextNoteTime < ctx.currentTime + METRO_LOOKAHEAD) {
    scheduleMetroBeat(metroCurrentBeat, metroNextNoteTime);
    const beatDuration = 60.0 / metroBPM;
    metroNextNoteTime += beatDuration;
    if (metroFreeClick || metroBeatsPerBar === 0) {
      metroCurrentBeat = 0; // no bar tracking in free mode
    } else {
      metroCurrentBeat = (metroCurrentBeat + 1) % metroBeatsPerBar;
    }
  }
}

function toggleMetronome() {
  if (metroRunning) {
    stopMetronome();
  } else {
    startMetronome();
  }
}

function startMetronome() {
  const ctx = getMetroAudioCtx();
  metroRunning = true;
  metroCurrentBeat = 0;
  metroNextNoteTime = ctx.currentTime + 0.05;
  metroScheduleTimer = setInterval(metroScheduler, METRO_INTERVAL);
  document.getElementById('metro-start').textContent = 'stop';
  document.getElementById('metro-start').classList.add('running');
}

function stopMetronome() {
  metroRunning = false;
  clearInterval(metroScheduleTimer);
  document.getElementById('metro-start').textContent = 'start';
  document.getElementById('metro-start').classList.remove('running');
  const s = document.getElementById('metro-light-strong');
  const w = document.getElementById('metro-light-weak');
  if (s) s.classList.remove('on');
  if (w) w.classList.remove('on');
}

let metroAccents = [true, false, false, false];
let metroFreeClick = false;

function toggleMetroBeats(n) {
  const wasActive = metroBeatsPerBar === n && !metroFreeClick;
  if (wasActive) {
    // deselect — free click mode
    metroFreeClick = true;
    metroBeatsPerBar = 0;
    document.querySelectorAll('.metro-count-btn').forEach(btn => btn.classList.remove('active'));
    document.getElementById('metro-accent-row').innerHTML = '';
    return;
  }
  metroFreeClick = false;
  setMetroBeats(n);
}

function setMetroBeats(n) {
  metroBeatsPerBar = n;
  metroFreeClick = false;
  const prev = metroAccents;
  metroAccents = Array.from({length: n}, (_, i) => i === 0 ? true : (prev[i] || false));
  metroCurrentBeat = 0;
  document.querySelectorAll('.metro-count-btn').forEach(btn => {
    btn.classList.toggle('active', +btn.textContent === n);
  });
  renderAccentGrid();
}

function toggleAccent(beat) {
  if (beat === 0) return; // beat 1 is always the downbeat, not togglable
  metroAccents[beat] = !metroAccents[beat];
  renderAccentGrid();
}

function renderAccentGrid() {
  const row = document.getElementById('metro-accent-row');
  row.innerHTML = '';
  for (let i = 0; i < metroBeatsPerBar; i++) {
    const btn = document.createElement('button');
    if (i === 0) {
      // beat 1 — always downbeat, visually distinct
      btn.className = 'metro-accent-btn beat1';
      btn.textContent = '1';
      btn.title = 'downbeat';
    } else {
      btn.className = 'metro-accent-btn' + (metroAccents[i] ? ' accented' : '');
      btn.textContent = i + 1;
      btn.onclick = () => toggleAccent(i);
    }
    row.appendChild(btn);
  }
}

function updateMetroBPMDisplay() {
  const input = document.getElementById('metro-bpm');
  if (input && document.activeElement !== input) input.value = metroBPM;
  const pct = (metroBPM - METRO_MIN_BPM) / (METRO_MAX_BPM - METRO_MIN_BPM);
  const angle = pct * 270 - 135;
  document.getElementById('metro-dial-needle').setAttribute('transform', 'rotate(' + angle + ' 100 100)');
}

function setMetroBPMFromInput(val) {
  if (isNaN(val)) return;
  metroBPM = Math.max(METRO_MIN_BPM, Math.min(METRO_MAX_BPM, Math.round(val)));
  updateMetroBPMDisplay();
}

// Dial interaction — drag to set BPM
(function initMetroDial() {
  let dragging = false;
  function getDial() { return document.getElementById('metro-dial-wrap'); }

  function angleFromEvent(e) {
    const dial = getDial();
    if (!dial) return 0;
    const rect = dial.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    const src = e.touches ? e.touches[0] : e;
    return Math.atan2(src.clientY - cy, src.clientX - cx);
  }

  function bpmFromAngle(angle) {
    let deg = angle * 180 / Math.PI;
    // convert atan2 output to clockwise-from-12 (0=12, 90=3, 180=6, 270=9)
    let clockDeg = (deg + 90 + 360) % 360;
    // sweep from 7:30 (225° from 12) going clockwise to 4:30 (135° from 12)
    let sweep = (clockDeg - 225 + 360) % 360;
    // dead zone is sweep > 270 (the bottom 90° of the dial)
    if (sweep > 270) {
      sweep = sweep > 315 ? 0 : 270; // snap to nearest end
    }
    const pct = sweep / 270;
    return Math.round(METRO_MIN_BPM + pct * (METRO_MAX_BPM - METRO_MIN_BPM));
  }

  document.addEventListener('mousedown', e => {
    const dial = getDial();
    if (dial && dial.contains(e.target)) { dragging = true; metroBPM = bpmFromAngle(angleFromEvent(e)); updateMetroBPMDisplay(); }
  });
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    metroBPM = bpmFromAngle(angleFromEvent(e));
    updateMetroBPMDisplay();
  });
  document.addEventListener('mouseup', () => { dragging = false; });

  document.addEventListener('touchstart', e => {
    const dial = getDial();
    if (dial && dial.contains(e.target)) { dragging = true; metroBPM = bpmFromAngle(angleFromEvent(e)); updateMetroBPMDisplay(); }
  }, { passive: true });
  document.addEventListener('touchmove', e => {
    if (!dragging) return;
    metroBPM = bpmFromAngle(angleFromEvent(e));
    updateMetroBPMDisplay();
  }, { passive: true });
  document.addEventListener('touchend', () => { dragging = false; });
})();

// Tap tempo
let tapTimes = [];
function metroTap() {
  const now = Date.now();
  // reset if more than 2 seconds since last tap
  if (tapTimes.length > 0 && now - tapTimes[tapTimes.length - 1] > 2000) {
    tapTimes = [];
  }
  tapTimes.push(now);
  if (tapTimes.length > 6) tapTimes.shift(); // keep last 6 taps
  if (tapTimes.length >= 2) {
    let totalInterval = 0;
    for (let i = 1; i < tapTimes.length; i++) {
      totalInterval += tapTimes[i] - tapTimes[i-1];
    }
    const avgInterval = totalInterval / (tapTimes.length - 1);
    metroBPM = Math.round(60000 / avgInterval);
    metroBPM = Math.max(METRO_MIN_BPM, Math.min(METRO_MAX_BPM, metroBPM));
    updateMetroBPMDisplay();
  }
}

function renderDialTicks() {
  const group = document.getElementById('metro-small-ticks');
  if (!group) return;
  const labeled = new Set([40, 82, 124, 166, 208]);
  let svg = '';
  for (let bpm = 40; bpm <= 208; bpm += 2) {
    if (labeled.has(bpm)) continue;
    const pct = (bpm - METRO_MIN_BPM) / (METRO_MAX_BPM - METRO_MIN_BPM);
    const angle = (pct * 270 - 135) * Math.PI / 180;
    const r_outer = 82, r_inner = 79;
    const x1 = 100 + r_outer * Math.sin(angle);
    const y1 = 100 - r_outer * Math.cos(angle);
    const x2 = 100 + r_inner * Math.sin(angle);
    const y2 = 100 - r_inner * Math.cos(angle);
    svg += `<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>`;
  }
  group.innerHTML = svg;
}

function clearPCanvas() {

function initPracticeDrawing() {
  const canvas = document.getElementById('p-annotation');

  // Remove any previous listeners before adding new ones
  if (canvas._pStartDraw) {
    canvas.removeEventListener('mousedown', canvas._pStartDraw);
    canvas.removeEventListener('mousemove', canvas._pDoDraw);
    canvas.removeEventListener('touchstart', canvas._pStartDraw);
    canvas.removeEventListener('touchmove', canvas._pDoDraw);
  }
  if (canvas._docEndDraw) {
    document.removeEventListener('mouseup', canvas._docEndDraw);
    document.removeEventListener('touchend', canvas._docEndDraw);
    document.removeEventListener('mouseleave', canvas._docEndDraw);
  }

  function getPos(e) {
    const r = canvas.getBoundingClientRect();
    const src = e.touches ? e.touches[0] : e;
    return { x: (src.clientX - r.left) * (canvas.width / r.width), y: (src.clientY - r.top) * (canvas.height / r.height) };
  }

  let pBoxStart = null, pBoxSnapshot = null;

  function startDraw(e) {
    if (!isPaused) return;
    e.preventDefault();
    if (pTool === 'text') {
      const src = e.touches ? e.touches[0] : e;
      showTextOverlay(src.clientX, src.clientY, canvas.getContext('2d'), canvas);
      return;
    }
    pDrawing = true;
    const p = getPos(e);
    pLastX = p.x; pLastY = p.y;
    if (pTool === 'box') {
      pBoxStart = p;
      pBoxSnapshot = canvas.getContext('2d').getImageData(0, 0, canvas.width, canvas.height);
    }
  }

  function doDraw(e) {
    if (!pDrawing || !isPaused) return;
    e.preventDefault();
    const ctx = canvas.getContext('2d');
    const p = getPos(e);
    const style = getDrawStyle();
    if (pTool === 'eraser') {
      const sz = brushSize * 5;
      ctx.clearRect(p.x - sz/2, p.y - sz/2, sz, sz);
    } else if (pTool === 'pen') {
      ctx.strokeStyle = style.color;
      ctx.lineWidth = brushSize * 0.65;
      ctx.lineCap = 'round'; ctx.lineJoin = 'round';
      if (style.dashed) ctx.setLineDash([6,4]); else ctx.setLineDash([]);
      ctx.beginPath();
      ctx.moveTo(pLastX, pLastY);
      ctx.lineTo(p.x, p.y);
      ctx.stroke();
      ctx.setLineDash([]);
    } else if (pTool === 'box' && pBoxStart) {
      if (pBoxSnapshot) ctx.putImageData(pBoxSnapshot, 0, 0);
      ctx.strokeStyle = style.color;
      ctx.lineWidth = Math.max(1.5, brushSize * 0.5);
      ctx.setLineDash(style.dashed ? [8,5] : [6,4]);
      ctx.strokeRect(pBoxStart.x, pBoxStart.y, p.x - pBoxStart.x, p.y - pBoxStart.y);
      ctx.setLineDash([]);
    }
    pLastX = p.x; pLastY = p.y;
  }

  function endDraw(e) {
    if (!pDrawing) return;
    pDrawing = false;
    if (pTool === 'box' && pBoxStart) {
      // finalize box with solid line
      const ctx = canvas.getContext('2d');
      const p = getPos(e);
      if (pBoxSnapshot) ctx.putImageData(pBoxSnapshot, 0, 0);
      const style = getDrawStyle();
      ctx.strokeStyle = style.color;
      ctx.lineWidth = Math.max(1.5, brushSize * 0.5);
      ctx.setLineDash(style.dashed ? [8,5] : []);
      ctx.strokeRect(pBoxStart.x, pBoxStart.y, p.x - pBoxStart.x, p.y - pBoxStart.y);
      ctx.setLineDash([]);
      pBoxStart = null; pBoxSnapshot = null;
    }
    savePracticeAnnotation();
  }

  // Disable tap zones while drawing
  const tapPrev = document.getElementById('tap-prev');
  const tapNext = document.getElementById('tap-next');
  if (tapPrev) tapPrev.style.pointerEvents = 'none';
  if (tapNext) tapNext.style.pointerEvents = 'none';

  canvas.addEventListener('mousedown', startDraw);
  canvas.addEventListener('mousemove', doDraw);
  canvas.addEventListener('touchstart', startDraw, { passive: false });
  canvas.addEventListener('touchmove', doDraw, { passive: false });

  // Store refs for cleanup
  canvas._pStartDraw = startDraw;
  canvas._pDoDraw = doDraw;

  // Use document-level end events to catch releases outside canvas
  const docEndDraw = (e) => endDraw(e);
  document.addEventListener('mouseup', docEndDraw);
  document.addEventListener('touchend', docEndDraw);
  document.addEventListener('mouseleave', docEndDraw);

  // Store cleanup ref on element for removal later
  canvas._docEndDraw = docEndDraw;
}

function initToolbarDrag() {
  const toolbar = document.getElementById('p-draw-toolbar');
  const handle = document.getElementById('p-draw-handle');
  let dragging = false, startX, startY, origLeft, origTop;

  function startDrag(e) {
    e.preventDefault();
    e.stopPropagation();
    dragging = true;
    const src = e.touches ? e.touches[0] : e;
    const rect = toolbar.getBoundingClientRect();
    // switch from bottom/left% to absolute pixel positioning
    toolbar.classList.add('dragging');
    toolbar.style.left = rect.left + 'px';
    toolbar.style.top = rect.top + 'px';
    toolbar.style.bottom = 'auto';
    origLeft = rect.left;
    origTop = rect.top;
    startX = src.clientX;
    startY = src.clientY;
  }

  function moveDrag(e) {
    if (!dragging) return;
    e.preventDefault();
    const src = e.touches ? e.touches[0] : e;
    const dx = src.clientX - startX;
    const dy = src.clientY - startY;
    const wrap = document.getElementById('p-img-wrap');
    const wRect = wrap.getBoundingClientRect();
    const tw = toolbar.offsetWidth;
    const th = toolbar.offsetHeight;
    const newLeft = Math.max(wRect.left, Math.min(origLeft + dx, wRect.right - tw));
    const newTop = Math.max(wRect.top, Math.min(origTop + dy, wRect.bottom - th - 8));
    toolbar.style.left = newLeft + 'px';
    toolbar.style.top = newTop + 'px';
  }

  function endDrag() { dragging = false; }

  handle.addEventListener('mousedown', startDrag);
  handle.addEventListener('touchstart', startDrag, { passive: false });
  document.addEventListener('mousemove', moveDrag);
  document.addEventListener('mouseup', endDrag);
  document.addEventListener('touchmove', moveDrag, { passive: false });
  document.addEventListener('touchend', endDrag);
}


function savePracticeAnnotation() {
  const entry = queue[qIdx];
  if (!entry) return;
  const canvas = document.getElementById('p-annotation');
  const dataURL = canvas.toDataURL();
  if (entry._type === 'group') {
    const grp = groups.find(g => g.id === entry.id);
    if (grp) {
      if (!grp._pageAnnotations) grp._pageAnnotations = {};
      grp._pageAnnotations[groupPageIdx] = dataURL;
      dbPutGroup(grp);
    }
  } else {
    const item = items.find(i => i.id === entry.id);
    if (item) { item.annotation = dataURL; dbPut(item); }
  }
}

// Runtime card list (loaded from DB, seeded on first run)
let restCards = [];
let lastRestCategory = null;

async function initRestCards() {
  const saved = await dbGetAllRestCards();
  if (saved.length === 0) {
    // First run — seed built-ins
    restCards = REST_CARDS_SEED.map(c => ({ ...c, enabled: true, custom: false }));
    for (const c of restCards) await dbPutRestCard(c);
  } else {
    // Merge: preserve user state, add any new seed cards not yet in DB
    const savedIds = new Set(saved.map(c => c.id));
    const merged = [...saved];
    for (const seed of REST_CARDS_SEED) {
      if (!savedIds.has(seed.id)) {
        const newCard = { ...seed, enabled: true, custom: false };
        merged.push(newCard);
        await dbPutRestCard(newCard);
      }
    }
    restCards = merged;
  }
}

function pickRestCard(durationSec) {
  const eligible = restCards.filter(c => c.enabled && durationSec >= c.minDuration);
  if (!eligible.length) return null;
  // Try to avoid repeating same category
  const different = lastRestCategory ? eligible.filter(c => c.category !== lastRestCategory) : eligible;
  const pool = different.length ? different : eligible;
  const picked = pool[Math.floor(Math.random() * pool.length)];
  lastRestCategory = picked.category;
  return picked;
}

// ── Rest cards editor panel ──────────────────────────────────────────────────
function openCardsPanel() {
  renderCardsPanel();
  document.getElementById('cards-panel').classList.add('open');
}
function closeCardsPanel() {
  document.getElementById('cards-panel').classList.remove('open');
}

function renderCardsPanel() {
  const body = document.getElementById('cards-panel-body');
  body.innerHTML = '';
  for (const cat of REST_CARD_CATEGORIES) {
    const cards = restCards.filter(c => c.category === cat.id);
    if (!cards.length) continue;
    const enabledCount = cards.filter(c => c.enabled).length;
    const allEnabled = enabledCount === cards.length;
    const someEnabled = enabledCount > 0 && enabledCount < cards.length;

    const section = document.createElement('div');
    section.className = 'rc-category';
    section.dataset.cat = cat.id;

    // Category header
    const hdr = document.createElement('div');
    hdr.className = 'rc-cat-header';
    hdr.innerHTML = `
      <span class="rc-cat-emoji">${cat.emoji}</span>
      <span class="rc-cat-label">${cat.label}</span>
      <span class="rc-cat-count">${enabledCount}/${cards.length}</span>
      <input type="checkbox" class="rc-cat-toggle" title="enable/disable category" ${allEnabled ? 'checked' : someEnabled ? 'indeterminate' : ''}>
      <span class="rc-cat-chevron">▶</span>`;
    const catCheck = hdr.querySelector('.rc-cat-toggle');
    if (someEnabled) catCheck.indeterminate = true;
    catCheck.addEventListener('change', (e) => {
      e.stopPropagation();
      toggleCategory(cat.id, catCheck.checked);
    });
    hdr.addEventListener('click', (e) => {
      if (e.target === catCheck) return;
      const list = section.querySelector('.rc-cards-list');
      const chevron = hdr.querySelector('.rc-cat-chevron');
      list.classList.toggle('open');
      chevron.classList.toggle('open');
    });
    section.appendChild(hdr);

    // Cards list
    const list = document.createElement('div');
    list.className = 'rc-cards-list';
    for (const card of cards) {
      list.appendChild(buildCardRow(card));
    }

    // Add card button
    const addRow = document.createElement('div');
    addRow.className = 'rc-add-card-row';
    const addBtn = document.createElement('button');
    addBtn.className = 'rc-add-btn';
    addBtn.textContent = '+ Add card';
    addBtn.addEventListener('click', () => addCard(cat.id));
    addRow.appendChild(addBtn);
    list.appendChild(addRow);

    section.appendChild(list);
    body.appendChild(section);
  }
}

function buildCardRow(card) {
  const row = document.createElement('div');
  row.className = 'rc-card-row' + (card.enabled ? '' : ' disabled');
  row.dataset.id = card.id;

  const check = document.createElement('input');
  check.type = 'checkbox';
  check.className = 'rc-card-check';
  check.checked = card.enabled;
  check.addEventListener('change', () => toggleCard(card.id, check.checked));

  const textWrap = document.createElement('div');
  textWrap.style.flex = '1';
  textWrap.style.display = 'flex';
  textWrap.style.flexDirection = 'column';
  textWrap.style.gap = '4px';

  const textEl = document.createElement('div');
  textEl.className = 'rc-card-text';
  textEl.textContent = card.text;

  const editArea = document.createElement('div');
  editArea.className = 'rc-card-edit-area';
  const textarea = document.createElement('textarea');
  textarea.className = 'rc-card-textarea';
  textarea.value = card.text;
  editArea.appendChild(textarea);

  const saveRow = document.createElement('div');
  saveRow.className = 'rc-card-save-row';
  const saveBtn = document.createElement('button');
  saveBtn.className = 'rc-card-save-btn primary';
  saveBtn.textContent = 'Save';
  saveBtn.addEventListener('click', () => saveCardEdit(card.id, textarea.value, textEl, editArea, saveRow, actionsEl));
  const cancelBtn = document.createElement('button');
  cancelBtn.className = 'rc-card-save-btn';
  cancelBtn.textContent = 'Cancel';
  cancelBtn.addEventListener('click', () => {
    textarea.value = card.text;
    textEl.classList.remove('editing');
    editArea.classList.remove('editing');
    saveRow.classList.remove('editing');
    actionsEl.style.display = '';
  });
  saveRow.appendChild(saveBtn);
  saveRow.appendChild(cancelBtn);

  textWrap.appendChild(textEl);
  textWrap.appendChild(editArea);
  textWrap.appendChild(saveRow);

  // Min duration badge
  if (card.minDuration > 0) {
    const badge = document.createElement('span');
    badge.className = 'rc-min-dur-badge';
    badge.textContent = `≥${card.minDuration}s`;
    textWrap.appendChild(badge);
  }

  // Action buttons
  const actionsEl = document.createElement('div');
  actionsEl.className = 'rc-card-actions';
  const editBtn = document.createElement('button');
  editBtn.className = 'rc-card-btn';
  editBtn.title = 'Edit';
  editBtn.textContent = '✎';
  editBtn.addEventListener('click', () => {
    textEl.classList.add('editing');
    editArea.classList.add('editing');
    saveRow.classList.add('editing');
    actionsEl.style.display = 'none';
    textarea.focus();
  });
  actionsEl.appendChild(editBtn);
  if (card.custom) {
    const delBtn = document.createElement('button');
    delBtn.className = 'rc-card-btn danger';
    delBtn.title = 'Delete';
    delBtn.textContent = '×';
    delBtn.addEventListener('click', () => deleteCard(card.id));
    actionsEl.appendChild(delBtn);
  }

  row.appendChild(check);
  row.appendChild(textWrap);
  row.appendChild(actionsEl);
  return row;
}

async function toggleCard(id, enabled) {
  const card = restCards.find(c => c.id === id);
  if (!card) return;
  card.enabled = enabled;
  await dbPutRestCard(card);
  // Update row appearance and category count without full re-render
  const row = document.querySelector(`.rc-card-row[data-id="${id}"]`);
  if (row) row.className = 'rc-card-row' + (enabled ? '' : ' disabled');
  refreshCatHeader(card.category);
}

async function toggleCategory(catId, enabled) {
  const cards = restCards.filter(c => c.category === catId);
  for (const card of cards) {
    card.enabled = enabled;
    await dbPutRestCard(card);
  }
  renderCardsPanel(); // re-render to sync all checkboxes
  // re-open the category that was just toggled
  const section = document.querySelector(`.rc-category[data-cat="${catId}"]`);
  if (section) {
    section.querySelector('.rc-cards-list').classList.add('open');
    section.querySelector('.rc-cat-chevron').classList.add('open');
  }
}

function refreshCatHeader(catId) {
  const cards = restCards.filter(c => c.category === catId);
  const enabledCount = cards.filter(c => c.enabled).length;
  const section = document.querySelector(`.rc-category[data-cat="${catId}"]`);
  if (!section) return;
  const count = section.querySelector('.rc-cat-count');
  if (count) count.textContent = `${enabledCount}/${cards.length}`;
  const catCheck = section.querySelector('.rc-cat-toggle');
  if (catCheck) {
    catCheck.checked = enabledCount === cards.length;
    catCheck.indeterminate = enabledCount > 0 && enabledCount < cards.length;
  }
}

async function saveCardEdit(id, newText, textEl, editArea, saveRow, actionsEl) {
  const text = newText.trim();
  if (!text) return;
  const card = restCards.find(c => c.id === id);
  if (!card) return;
  card.text = text;
  await dbPutRestCard(card);
  textEl.textContent = text;
  textEl.classList.remove('editing');
  editArea.classList.remove('editing');
  saveRow.classList.remove('editing');
  actionsEl.style.display = '';
}

async function deleteCard(id) {
  restCards = restCards.filter(c => c.id !== id);
  await dbDeleteRestCard(id);
  const row = document.querySelector(`.rc-card-row[data-id="${id}"]`);
  if (row) row.remove();
}

function addCard(catId) {
  const id = 'rc_custom_' + Date.now();
  const newCard = { id, category: catId, minDuration: 0, breathe: false, text: '', enabled: true, custom: true };
  restCards.push(newCard);
  dbPutRestCard(newCard);
  // Insert row before the add button
  const section = document.querySelector(`.rc-category[data-cat="${catId}"]`);
  if (!section) return;
  const list = section.querySelector('.rc-cards-list');
  const addRow = list.querySelector('.rc-add-card-row');
  const row = buildCardRow(newCard);
  list.insertBefore(row, addRow);
  // Open list if not already open
  list.classList.add('open');
  section.querySelector('.rc-cat-chevron').classList.add('open');
  // Auto-open edit mode on the new card
  const textEl = row.querySelector('.rc-card-text');
  const editArea = row.querySelector('.rc-card-edit-area');
  const saveRow = row.querySelector('.rc-card-save-row');
  const actionsEl = row.querySelector('.rc-card-actions');
  textEl.classList.add('editing');
  editArea.classList.add('editing');
  saveRow.classList.add('editing');
  actionsEl.style.display = 'none';
  row.querySelector('textarea').focus();
  refreshCatHeader(catId);
}


let restTimerTick = null;
let restLeft = 0;
let restTotal = 45;
let breatheTick = null;
let itemsSinceRest = 0;

let restEnabled = true;

function toggleRestEnabled() {
  restEnabled = !restEnabled;
  const status = document.getElementById('rest-status');
  if (status) status.textContent = restEnabled ? 'on' : 'off';
}

function updateRestUI() {
  const status = document.getElementById('rest-status');
  if (status) status.textContent = restEnabled ? 'on' : 'off';
}

function shouldRest() {
  if (!restEnabled) return false;
  const every = parseInt(document.getElementById('rest-every').value) || 5;
  return itemsSinceRest >= every;
}

function startRest() {
  itemsSinceRest = 0;
  restTotal = parseInt(document.getElementById('rest-dur').value) || 45;
  restLeft = restTotal;
  const showSuggestions = document.getElementById('rest-suggestions').checked;
  const actText = document.getElementById('rest-activity-text');
  const breatheWrap = document.getElementById('rest-breathe-wrap');
  if (showSuggestions) {
    const act = pickRestCard(restTotal);
    if (act) {
      actText.textContent = act.text;
      actText.style.display = '';
      breatheWrap.style.display = act.breathe ? 'flex' : 'none';
      if (act.breathe) startBreathe();
    } else {
      actText.style.display = 'none';
      breatheWrap.style.display = 'none';
    }
  } else {
    actText.style.display = 'none';
    breatheWrap.style.display = 'none';
  }
  updateRestTimerDisplay();
  document.getElementById('rest-screen').classList.add('show');
  restTimerTick = setInterval(() => {
    restLeft--;
    updateRestTimerDisplay();
    if (restLeft <= 0) endRest();
  }, 1000);
}

function updateRestTimerDisplay() {
  const m = Math.floor(restLeft/60).toString().padStart(2,'0');
  const s = (restLeft%60).toString().padStart(2,'0');
  document.getElementById('rest-timer').textContent = m + ':' + s;
}

function endRest() {
  clearInterval(restTimerTick);
  clearInterval(breatheTick);
  clearInterval(window._breatheCountTick);
  document.getElementById('rest-screen').classList.remove('show');
  document.getElementById('rest-breathe-circle').classList.remove('expand');
  chimeAndSignal();
  showPracticeItem();
  startTimer();
}

function startBreathe() {
  let breathePhase = 0;
  let countDown = 4;
  clearInterval(breatheTick);
  const circle = document.getElementById('rest-breathe-circle');
  const label = document.getElementById('rest-breathe-label');
  const count = document.getElementById('rest-breathe-count');
  const phases = ['breathe in', 'hold', 'breathe out', 'hold'];

  function step() {
    circle.classList.toggle('expand', breathePhase === 0 || breathePhase === 1);
    label.textContent = phases[breathePhase];
    countDown = 4;
    count.textContent = countDown;
    breathePhase = (breathePhase + 1) % 4;
  }

  step();
  breatheTick = setInterval(step, 4000);

  // Count down within each 4-second phase
  const countTick = setInterval(() => {
    countDown--;
    if (countDown > 0 && count) count.textContent = countDown;
  }, 1000);

  // Store so we can clear it
  window._breatheCountTick = countTick;
}

function chimeAndSignal() {
  const flash = document.getElementById('rest-flash');
  if (flash) { flash.classList.add('pop'); setTimeout(() => flash.classList.remove('pop'), 300); }
  if (navigator.vibrate) navigator.vibrate([150, 80, 150]);
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(523, ctx.currentTime);
    osc.frequency.setValueAtTime(659, ctx.currentTime + 0.18);
    gain.gain.setValueAtTime(0.4, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.7);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.75);
  } catch(e) {}
}

// Dismiss text overlay when clicking outside it
document.addEventListener('mousedown', (e) => {
  const ov = document.getElementById('text-overlay');
  const controls = document.getElementById('text-overlay-controls');
  if (ov && ov.classList.contains('show')) {
    const inCursor = e.target.id === 'text-cursor';
    const inControls = controls && controls.contains(e.target);
    const isCanvas = e.target.id === 'draw-canvas' || e.target.id === 'p-annotation';
    if (!inCursor && !inControls && !isCanvas) commitTextAnnotation();
  }
}, true);
document.addEventListener('touchstart', (e) => {
  const ov = document.getElementById('text-overlay');
  const controls = document.getElementById('text-overlay-controls');
  if (ov && ov.classList.contains('show')) {
    const inCursor = e.target.id === 'text-cursor';
    const inControls = controls && controls.contains(e.target);
    const isCanvas = e.target.id === 'draw-canvas' || e.target.id === 'p-annotation';
    if (!inCursor && !inControls && !isCanvas) commitTextAnnotation();
  }
}, true);

openDB().then(async () => {
  initEink();
  initDragContainer();
  initDropZone();
  const saved = await dbGetAll();
  const savedGroups = await dbGetAllGroups();
  await initRestCards();
  items = saved.sort((a,b) => (a.order||0)-(b.order||0));
  groups = savedGroups.sort((a,b) => (a.order||0)-(b.order||0));
  renderSidebar();
  // select first visible (non-group-member) item
  const firstVisible = items.find(i => !i._groupMember);
  if (firstVisible) selectItem(firstVisible.id);
  const visibleCount = items.filter(i => !i._groupMember).length + groups.length;
  if (visibleCount) toast(visibleCount + ' items loaded');
}).catch(err => {
  toast('DB error: ' + err.message);
  console.error(err);
});
