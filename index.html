<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Interleaves</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Spectral:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
/* ── Ocean (default) ─────────────────────────────────────────────────────── */
:root {
  --bg:        #FFFFFF;
  --bg2:       #F0F6FF;
  --bg3:       #DFF0FA;
  --chrome:    #2A6496;
  --ink:       #1A2B3C;
  --ink2:      #4A6278;
  --ink3:      #7A9AB2;
  --accent:    #2A6496;
  --accent2:   #1A4F7A;
  --accent-fg: #FFFFFF;
  --red:       #8b2c2c;
  --border:    rgba(42,100,150,0.15);
  --border2:   rgba(42,100,150,0.28);
  --score-bg:  #FFFFFF;
  --canvas-bg: #F0F6FF;
  --radius: 4px;
  --font-mono: 'IBM Plex Mono', monospace;
  --font-serif: 'Spectral', serif;
  --sidebar-w: 280px;
  --toolbar-h: 52px;
  --btn-h: 36px;
  --status-h: 28px;
}
/* ── Warm (formerly Ink & Parchment) ─────────────────────────────────────── */
html.warm {
  --bg:        #F5F0E8;
  --bg2:       #EDE7D9;
  --bg3:       #E2DBD0;
  --chrome:    #2C2C2C;
  --ink:       #2C2C2C;
  --ink2:      #6B6459;
  --ink3:      #9B9189;
  --accent:    #2C2C2C;
  --accent2:   #444444;
  --accent-fg: #FFFFFF;
  --red:       #8b2c2c;
  --border:    rgba(44,44,44,0.18);
  --border2:   rgba(44,44,44,0.28);
  --score-bg:  #F5F0E8;
  --canvas-bg: #ccc9c0;
}
/* ── Clean White theme ───────────────────────────────────────────────────── */
html.clean-white {
  --bg:        #ffffff;
  --bg2:       #fafafa;
  --bg3:       #f0f0f0;
  --chrome:    #222222;
  --ink:       #000000;
  --ink2:      #333333;
  --ink3:      #666666;
  --accent:    #000000;
  --accent2:   #333333;
  --accent-fg: #ffffff;
  --border:    rgba(0,0,0,0.15);
  --border2:   rgba(0,0,0,0.25);
  --score-bg:  #ffffff;
  --canvas-bg: #e8e8e8;
}

/* ── Clean White — all white, black borders, hatched selections ──────────── */
html.pure-white {
  --bg:        #ffffff;
  --bg2:       #ffffff;
  --bg3:       #f5f5f5;
  --chrome:    #ffffff;
  --ink:       #000000;
  --ink2:      #333333;
  --ink3:      #888888;
  --accent:    #000000;
  --accent2:   #333333;
  --accent-fg: #ffffff;
  --border:    #000000;
  --border2:   #000000;
  --score-bg:  #ffffff;
  --canvas-bg: #ffffff;
  --hatch: repeating-linear-gradient(45deg, transparent, transparent 3px, rgba(0,0,0,0.1) 3px, rgba(0,0,0,0.1) 4px);
}

/* Topbar & sidebar head — white chrome, black borders */
html.pure-white #topbar { background: #fff; border-bottom: 2px solid #000; }
html.pure-white .s-head  { background: #fff; border-bottom: 2px solid #000; border-right: 2px solid #000; }
html.pure-white #app-name { color: #000; }

/* Topbar buttons */
html.pure-white .t-btn { border: 1.5px solid #000; color: #000; background: #fff; }
html.pure-white .t-btn:hover { background: #f0f0f0; }
html.pure-white .t-btn.active { background: var(--hatch); color: #000; border-color: #000; }
html.pure-white .t-btn.danger:hover { color: #000; border-color: #000; background: #f5f5f5; }
html.pure-white .t-sep { background: #000; }
html.pure-white #tool-pick { color: #000; background: #fff; border: 1.5px solid #000; }
html.pure-white #tool-pick option { background: #fff; color: #000; }
html.pure-white #annot-type-btn { border: 1.5px solid #000; color: #000; background: #fff; }
html.pure-white #annot-type-btn.practice-mode { color: #8b2c2c; border-color: #8b2c2c; }
html.pure-white #annot-type-btn.active { background: var(--hatch); }
html.pure-white .s-hdr-btn { border: 1.5px solid #000; color: #000; background: #fff; }
html.pure-white .s-hdr-btn:hover { background: #f0f0f0; }
html.pure-white .s-hdr-sep { background: #000; }
html.pure-white input[type=range] { background: #999; }
html.pure-white input[type=range]::-webkit-slider-thumb { background: #000; }

/* Sidebar */
html.pure-white #sidebar-scroll { border-right: 2px solid #000; }
html.pure-white .item { border: 1px solid #ccc; }
html.pure-white .item.selected { background: var(--hatch) !important; border-color: #000; }
html.pure-white .item.active { background: var(--hatch) !important; border: 2px solid #000; }
html.pure-white .item:hover { background: #f5f5f5; }

/* Bottom controls */
html.pure-white .order-btn { border: 1.5px solid #000; color: #000; background: #fff; }
html.pure-white .order-btn.active { background: var(--hatch); color: #000; border-color: #000; font-weight: 700; }
html.pure-white #go-btn { background: #000; color: #fff; border: none; }
html.pure-white #go-btn:hover { background: #333; }

/* Practice header */
html.pure-white #p-header { background: #fff; border-bottom: 2px solid #000; }
html.pure-white #p-header .p-btn { border: 1.5px solid #000; color: #000; background: #fff; }
html.pure-white #p-header .p-btn:hover { background: #f0f0f0; }
html.pure-white #p-header .p-btn.primary { background: var(--hatch); color: #000; border-color: #000; }
html.pure-white #p-timer { color: #000; }
html.pure-white #p-title { color: #000; }
html.pure-white #p-counter { color: #555; }
html.pure-white #p-pause { border: 1.5px solid #000; color: #000; }
html.pure-white #p-pause.paused { background: var(--hatch); }
html.pure-white #p-progress { background: #eee; }
html.pure-white #p-progress-bar { background: #000; }
html.pure-white .w-pick { color: #000; background: #fff; border-color: #000; }

/* Settings panel */
html.pure-white #settings-panel { border-left: 2px solid #000; }
html.pure-white #settings-header { background: #fff; border-bottom: 2px solid #000; }
html.pure-white #settings-title { color: #000; }
html.pure-white #settings-close { border: 1.5px solid #000; color: #000; }

/* Metronome panel */
html.pure-white #metro-panel { background: #fff; border: 2px solid #000; }
html.pure-white #metro-header { border-bottom: 2px solid #000; }
html.pure-white #metro-title { color: #555; }
html.pure-white #metro-close { color: #000; }
html.pure-white #metro-bpm { color: #000; border-bottom-color: #000; }
html.pure-white #metro-bpm-unit { color: #555; }
html.pure-white .metro-count-btn { border: 1.5px solid #000; color: #000; background: #fff; }
html.pure-white .metro-count-btn.active { background: var(--hatch); color: #000; border-color: #000; }
html.pure-white .metro-accent-btn { border: 1.5px solid #000; background: #fff; color: #000; }
html.pure-white .metro-accent-btn.beat1 { background: #000; color: #fff; }
html.pure-white .metro-accent-btn.accented { background: var(--hatch); }
html.pure-white #metro-tap, html.pure-white #metro-start { border: 1.5px solid #000; color: #000; background: #fff; }
html.pure-white #metro-start.running { background: var(--hatch); }
html.pure-white #metro-dial circle { stroke: #999; }
html.pure-white #metro-dial line { stroke: #000 !important; }
html.pure-white #metro-dial text { fill: #000 !important; }
html.pure-white #metro-dial-needle { stroke: #000 !important; }
#tool-pick {
  font-family: var(--font-mono);
  font-size: 13px;
  color: rgba(255,255,255,0.9);
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: var(--radius);
  padding: 0 8px;
  height: var(--btn-h);
  cursor: pointer;
}
#tool-pick option { background: #2c2c2c; color: #fff; }
html.eink #tool-pick { color: #000; background: #f0f0f0; border-color: #999; }
html.eink #tool-pick option { background: #fff; color: #000; }
html.clean-white #tool-pick { color: var(--ink); background: var(--bg); border-color: var(--border2); }
html.clean-white #tool-pick option { background: #fff; color: #000; }
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; display: flex; flex-direction: column; background: var(--bg); color: var(--ink); font-family: var(--font-mono); font-size: 13px; }
#topbar { height: var(--toolbar-h); padding: 0 12px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; background: var(--chrome); flex-shrink: 0; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
#topbar::-webkit-scrollbar { display: none; }
#app { display: flex; flex: 1; min-height: 0; overflow: hidden; align-items: stretch; }
#sidebar { width: var(--sidebar-w); min-width: var(--sidebar-w); display: flex; flex-direction: column; background: var(--bg2); border-right: 1px solid var(--border); min-height: 0; max-height: 100%; overflow: hidden; }
#main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
#sidebar-scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; min-height: 0; }
#sidebar-scroll::-webkit-scrollbar { width: 4px; }
#sidebar-scroll::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
#file-action-pick { font-family: var(--font-mono); font-size: 15px; color: rgba(255,255,255,0.9); background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.25); border-radius: var(--radius); height: var(--btn-h); padding: 0 8px; cursor: pointer; flex-shrink: 0; }
#file-action-pick option { background: #2a6496; color: #fff; }
html.eink #file-action-pick { background: #f0f0f0; border-color: #999; color: #000; }
html.eink #file-action-pick option { background: #fff; color: #000; }
html.warm #file-action-pick { color: var(--ink); background: var(--bg); border-color: var(--border2); }
html.warm #file-action-pick option { background: #fff; color: #000; }
html.pure-white #file-action-pick { color: #000; background: #fff; border: 1.5px solid #000; }
html.pure-white #file-action-pick option { background: #fff; color: #000; }
#app-name { position: absolute; top: 14px; left: 16px; font-family: var(--font-serif); font-size: 19px; color: var(--ink3); letter-spacing: .03em; white-space: nowrap; pointer-events: none; z-index: 1; }
.s-hdr-btn { flex: 1; height: var(--btn-h); padding: 0 4px; background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.25); border-radius: var(--radius); cursor: pointer; font-family: var(--font-mono); font-size: 15px; color: rgba(255,255,255,0.85); text-align: center; white-space: nowrap; display: flex; align-items: center; justify-content: center; }
.s-hdr-btn:hover { background: rgba(255,255,255,0.22); color: #fff; }
.s-hdr-sep { width: 1px; background: rgba(255,255,255,0.25); align-self: stretch; flex-shrink: 0; margin: 6px 2px; }
#item-list { padding: 6px; display: flex; flex-direction: column; gap: 3px; flex: 1; }

.item { border: 1.5px solid var(--border); border-radius: var(--radius); background: var(--bg); padding: 10px; cursor: pointer; display: flex; align-items: center; gap: 8px; position: relative; user-select: none; }
.item:hover { border-color: var(--ink2); background: var(--bg2); }
.item.active { border: 3px solid var(--ink); background: var(--bg2); }
.item-drag { cursor: grab; color: var(--ink3); font-size: 18px; flex-shrink: 0; touch-action: none; user-select: none; -webkit-user-select: none; padding: 4px; }
.item-info { flex: 1; min-width: 0; }
.item-name { font-size: 15px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--ink); }
.item-btns { display: flex; gap: 3px; flex-shrink: 0; }
.item-btn { background: none; border: none; cursor: pointer; padding: 5px 6px; color: var(--ink3); border-radius: 2px; font-size: 17px; line-height: 1; }
.item-btn:hover { color: var(--ink); background: var(--bg3); }
.item-btn.del:hover { color: var(--red); }

.s-bottom { padding: 10px 10px 24px 10px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px; background: var(--bg2); flex-shrink: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; }
.timer-row { display: flex; align-items: center; gap: 6px; font-size: 15px; color: var(--ink2); }
.timer-row input[type=number] { width: 58px; padding: 0 6px; height: 36px; border: 1px solid var(--border2); border-radius: var(--radius); background: var(--bg); font-family: var(--font-mono); font-size: 15px; color: var(--ink); text-align: center; }
.timer-row input[type=number]:focus { outline: 2px solid var(--accent); }
.order-row { display: flex; gap: 5px; }
.order-btn { flex: 1; height: 36px; border: 1px solid var(--border2); border-radius: var(--radius); background: var(--bg); cursor: pointer; font-family: var(--font-mono); font-size: 15px; color: var(--ink2); text-align: center; display: flex; align-items: center; justify-content: center; }
.order-btn:hover { background: var(--bg3); border-color: var(--ink2); color: var(--ink); }
.order-btn.active { background: var(--accent); color: var(--accent-fg); border-color: var(--accent); font-weight: 600; }
#go-btn { width: 100%; height: 44px; background: var(--accent); color: var(--accent-fg); border: none; border-radius: var(--radius); cursor: pointer; font-family: var(--font-mono); font-size: 17px; font-weight: 600; letter-spacing: .05em; }
#go-btn:hover { background: var(--accent2); }
#go-btn:disabled { opacity: .35; cursor: not-allowed; }

/* Toolbar (now #topbar — kept for any remaining references) */
#toolbar { display: none; } /* removed — use #topbar */
.t-label { font-size: 13px; color: rgba(255,255,255,0.5); letter-spacing: .06em; text-transform: uppercase; margin-right: 2px; }
.t-btn { background: none; border: 1px solid rgba(255,255,255,0.25); border-radius: var(--radius); padding: 0 11px; height: var(--btn-h); cursor: pointer; font-family: var(--font-mono); font-size: 15px; color: rgba(255,255,255,0.8); white-space: nowrap; display: flex; align-items: center; }
.t-btn:hover { background: rgba(255,255,255,0.15); color: #fff; }
.t-btn.active { background: rgba(255,255,255,0.2); color: #fff; border-color: rgba(255,255,255,0.6); }
.t-btn.danger:hover { color: #ffaaaa; border-color: #ffaaaa; }
.t-sep { width: 1px; height: 22px; background: rgba(255,255,255,0.2); flex-shrink: 0; }
.t-spacer { flex: 1; }
#size-wrap { display: flex; align-items: center; gap: 5px; }
#size-wrap span { font-size: 13px; color: rgba(255,255,255,0.5); min-width: 18px; text-align: right; }
input[type=range] { -webkit-appearance: none; height: 3px; background: rgba(255,255,255,0.3); border-radius: 2px; width: 70px; }
input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: #fff; cursor: pointer; }
#color-pick { width: 22px; height: 22px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.4); cursor: pointer; padding: 0; background: #1a1814; -webkit-appearance: none; }
#color-pick::-webkit-color-swatch-wrapper { padding: 0; border-radius: 50%; }
#color-pick::-webkit-color-swatch { border: none; border-radius: 50%; }

/* Canvas area */
#canvas-area { flex: 1; position: relative; overflow: hidden; background: var(--canvas-bg); }
#sheet-img { position: absolute; display: none; }
#draw-canvas { position: absolute; touch-action: none; }
#drop-zone { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
#drop-label { border: 2px dashed var(--border2); border-radius: 6px; padding: 36px 48px; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 10px; background: var(--bg); text-align: center; }
#drop-label:hover { border-color: var(--accent2); }
#drop-label .icon { font-size: 36px; color: var(--ink3); }
#drop-label p { font-family: var(--font-serif); font-size: 15px; color: var(--ink2); }
#drop-label small { font-size: 10px; color: var(--ink3); letter-spacing: .04em; }
#file-input { display: none; }

/* Status bar */
#status { height: var(--status-h); padding: 0 12px; border-top: 1px solid var(--border); background: var(--bg2); display: flex; align-items: center; gap: 16px; font-size: 10px; color: var(--ink3); letter-spacing: .04em; flex-shrink: 0; }
#status span { display: flex; align-items: center; gap: 4px; }

/* Practice overlay */
#practice-screen { position: fixed; inset: 0; background: var(--bg); z-index: 100; display: none; flex-direction: column; }
#practice-screen.show { display: flex; }
#p-header { padding: 8px 12px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; background: var(--chrome); flex-shrink: 0; flex-wrap: wrap; }
#p-title { flex: 1; font-family: var(--font-serif); font-size: 14px; color: rgba(255,255,255,0.9); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 60px; }
#p-timer { font-size: 20px; font-weight: 500; color: rgba(255,255,255,0.9); min-width: 52px; text-align: right; font-variant-numeric: tabular-nums; }
#p-img-wrap { flex: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; background: var(--canvas-bg); }
#p-img { max-width: 100%; max-height: 100%; object-fit: contain; display: block; }
#p-annotation { position: absolute; pointer-events: none; }
.p-btn { border: 1px solid var(--border2); border-radius: var(--radius); padding: 7px 14px; cursor: pointer; font-family: var(--font-mono); font-size: 12px; background: none; color: var(--ink2); }
.p-btn:hover { background: var(--bg3); color: var(--ink); }
.p-btn.primary { background: var(--chrome); color: var(--accent-fg); border-color: var(--chrome); }
.p-btn.primary:hover { background: var(--accent2); }
#p-header .p-btn { border-color: rgba(255,255,255,0.3); color: rgba(255,255,255,0.85); background: none; }
#p-header .p-btn:hover { background: rgba(255,255,255,0.15); color: #fff; border-color: rgba(255,255,255,0.6); }
#p-header .p-btn.primary { background: rgba(255,255,255,0.2); color: #fff; border-color: rgba(255,255,255,0.5); }
html.eink #p-header .p-btn { border-color: #999; color: #000; background: #f0f0f0; }
html.eink #p-header .p-btn:hover { background: #ddd; }
html.eink #p-header .p-btn.primary { background: #000; color: #fff; border-color: #000; }
#p-close { background: none; border: none; cursor: pointer; font-size: 18px; color: rgba(255,255,255,0.6); padding: 4px; line-height: 1; }
#p-close:hover { color: #ffaaaa; }
#p-progress { height: 3px; background: rgba(255,255,255,0.2); flex-shrink: 0; }
#p-progress-bar { height: 100%; background: rgba(255,255,255,0.7); transition: width .1s linear; }

/* Rename modal */
#rename-modal { position: fixed; inset: 0; background: rgba(26,24,20,.5); z-index: 200; display: none; align-items: center; justify-content: center; }
#rename-modal.show { display: flex; }
#rename-box { background: var(--bg); border: 1px solid var(--border2); border-radius: 6px; padding: 20px; width: 300px; display: flex; flex-direction: column; gap: 10px; }
#rename-box label { font-size: 11px; color: var(--ink2); letter-spacing: .05em; text-transform: uppercase; }
#rename-input { padding: 8px; border: 1px solid var(--border2); border-radius: var(--radius); font-family: var(--font-mono); font-size: 13px; background: var(--bg); color: var(--ink); }
#rename-input:focus { outline: 1px solid var(--accent); }
.modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
.modal-btn { padding: 6px 14px; border-radius: var(--radius); border: 1px solid var(--border2); cursor: pointer; font-family: var(--font-mono); font-size: 12px; background: none; color: var(--ink2); }
.modal-btn.ok { background: var(--accent); color: #f4f1eb; border-color: var(--accent); }

/* Drag ghost */
.drag-over { border-color: var(--accent2) !important; background: #e8ede9 !important; }

/* Rest period sidebar controls */
.s-settings-link { background: none; border: 1px solid var(--border2); border-radius: var(--radius); padding: 0 10px; height: 36px; cursor: pointer; font-family: var(--font-mono); font-size: 13px; color: var(--ink2); text-align: left; width: 100%; display: flex; align-items: center; gap: 4px; }
.s-settings-link:hover { background: var(--bg3); color: var(--ink); }
.s-settings-link #rest-status { color: var(--accent); font-weight: 600; }
.rest-toggle { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 15px; color: var(--ink2); }
.rest-toggle input[type=checkbox] { width: 20px; height: 20px; cursor: pointer; accent-color: var(--accent); }
#rest-settings { display: flex; flex-direction: column; gap: 4px; padding-left: 24px; }
.rest-detail { font-size: 15px; color: var(--ink2); display: flex; align-items: center; gap: 5px; }
.rest-detail input[type=number] { padding: 0 6px; height: 36px; border: 1px solid var(--border2); border-radius: var(--radius); background: var(--bg); font-family: var(--font-mono); font-size: 15px; color: var(--ink); text-align: center; }

/* Rest screen */
#rest-screen { position: fixed; inset: 0; background: var(--chrome); z-index: 101; display: none; flex-direction: column; }
#rest-screen.show { display: flex; }
#rest-header { padding: 12px 16px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid rgba(255,255,255,0.15); flex-shrink: 0; }
#rest-skip { background: none; border: 1px solid rgba(255,255,255,0.3); border-radius: var(--radius); padding: 5px 12px; cursor: pointer; font-family: var(--font-mono); font-size: 12px; color: rgba(255,255,255,0.7); }
#rest-skip:hover { background: rgba(255,255,255,0.15); color: #fff; }

/* ── E-ink / high-contrast mode ─────────────────────────────────────────── */
/* Triggered by: (a) manual toggle, (b) prefers-contrast: more media query   */

.eink,
@media (prefers-contrast: more) { :root {
  --bg:      #ffffff;
  --bg2:     #f0f0f0;
  --bg3:     #e0e0e0;
  --ink:     #000000;
  --ink2:    #222222;
  --ink3:    #444444;
  --accent:  #000000;
  --accent2: #333333;
  --red:     #000000;
  --border:  #000000;
  --border2: #000000;
  --radius:  2px;
}}

/* E-ink mode: flip chrome areas to white/light — e-ink can't handle light text on dark */
html.eink {
  --bg:      #ffffff;
  --bg2:     #f0f0f0;
  --bg3:     #e0e0e0;
  --chrome:  #ffffff;
  --ink:     #000000;
  --ink2:    #222222;
  --ink3:    #444444;
  --accent:  #000000;
  --accent2: #333333;
  --accent-fg: #ffffff;
  --red:     #000000;
  --border:  #000000;
  --border2: #000000;
  --radius:  2px;
}

/* Kill all transitions and animations in e-ink mode */
html.eink *, html.eink *::before, html.eink *::after {
  transition: none !important;
  animation: none !important;
}
@media (prefers-contrast: more) {
  *, *::before, *::after { transition: none !important; animation: none !important; }
}

/* Heavier borders, larger touch targets, WHITE toolbar in e-ink mode */
html.eink .item        { border-width: 1.5px; padding: 10px 8px; }
html.eink .t-label     { color: #555; }

html.eink .order-btn   { border: 1px solid #000; background: #fff; color: #000; }

html.eink #go-btn      { background: #000; color: #fff; border: none; font-size: 13px; }
html.eink .item        { border: 2px solid #000; }
html.eink .item.active { border: 3px solid #000; }
html.eink .p-btn       { border: 1.5px solid #000; padding: 9px 16px; font-size: 13px; color: #000; }
html.eink .p-btn.primary { background: #000; color: #fff; border-color: #000; }
html.eink #p-header    { background: #fff; border-bottom: 1.5px solid #000; }
html.eink #p-title     { color: #000; }
html.eink #p-timer     { color: #000; }
html.eink #p-close     { color: #444; }
html.eink #p-close:hover { color: #000; }
html.eink #p-progress-bar { background: #000; }
html.eink #p-progress  { background: #ccc; height: 4px; }
html.eink .item.active { background: #e0e0e0; border-color: #000; border-width: 2px; }
html.eink .modal-btn.ok { background: #000; color: #fff; }
html.eink #eink-toggle { background: #f0f0f0; border-color: #999; color: #000; }
html.eink #theme-toggle { border-color: #000; color: #000; }
html.eink #canvas-area { background: #888; }
html.eink #p-img-wrap  { background: #888; }
html.eink #drop-label  { border-color: #000; border-width: 2px; }
html.eink #toast       { transition: none !important; border-radius: 4px; }
html.eink .item-btn    { font-size: 15px; padding: 5px; }
html.eink .w-btn.active { background: #000; border-color: #000; color: #fff; }

/* E-ink toggle button — always visible in toolbar */
#eink-toggle { background: none; border: 1px solid rgba(255,255,255,0.25); border-radius: var(--radius); padding: 0 11px; height: var(--btn-h); cursor: pointer; font-family: var(--font-mono); font-size: 15px; color: rgba(255,255,255,0.6); white-space: nowrap; margin-left: 4px; }
#eink-toggle:hover { color: #fff; }

/* Theme toggle */
#theme-toggle { background: none; border: 1px solid rgba(255,255,255,0.25); border-radius: var(--radius); padding: 0 11px; height: var(--btn-h); cursor: pointer; font-family: var(--font-mono); font-size: 15px; color: rgba(255,255,255,0.6); white-space: nowrap; }
#theme-toggle:hover { color: #fff; }

/* Select mode */
.item-check { width: 20px; height: 20px; border: 2px solid var(--border2); border-radius: 3px; flex-shrink: 0; display: none; align-items: center; justify-content: center; font-size: 13px; }
body.select-mode .item-check { display: flex; }
body.select-mode .item-drag { display: none; }
body.select-mode .item.selected { border: 3px solid var(--ink); }
body.select-mode .item.selected .item-check { border-color: var(--ink); background: var(--ink); color: var(--bg); }
.item-page-count { font-size: 11px; color: var(--ink3); flex-shrink: 0; font-style: italic; }
#group-btn { width: 100%; height: 44px; padding: 0 10px; background: var(--bg); color: var(--ink); border: 2px solid var(--ink); border-radius: var(--radius); cursor: pointer; font-family: var(--font-mono); font-size: 15px; font-weight: 500; display: none; }
#delete-selected-btn { width: 100%; height: 44px; padding: 0 10px; background: var(--bg); color: var(--red); border: 2px solid var(--red); border-radius: var(--radius); cursor: pointer; font-family: var(--font-mono); font-size: 15px; font-weight: 500; display: none; }
#cancel-select-btn { width: 100%; height: 44px; padding: 0 10px; background: none; color: var(--ink2); border: 1.5px solid var(--border2); border-radius: var(--radius); cursor: pointer; font-family: var(--font-mono); font-size: 14px; display: none; }
body.select-mode #group-btn { display: block; }
body.select-mode #delete-selected-btn { display: block; }
body.select-mode #cancel-select-btn { display: block; }
body.select-mode #go-btn { display: none; }
html.eink #group-btn { border-width: 2px; }
html.eink #delete-selected-btn { border-width: 2px; }
html.eink #cancel-select-btn { border-width: 2px; }

/* Loading overlay */
#loading-overlay { position: absolute; inset: 0; background: rgba(244,240,232,0.88); display: none; align-items: center; justify-content: center; z-index: 20; }
#loading-overlay.show { display: flex; }
#loading-box { display: flex; flex-direction: column; align-items: center; gap: 14px; }
#loading-spinner { width: 36px; height: 36px; border: 3px solid var(--border2); border-top-color: var(--ink); border-radius: 50%; animation: spin 0.8s linear infinite; }
#loading-msg { font-family: var(--font-mono); font-size: 13px; color: var(--ink2); }
@keyframes spin { to { transform: rotate(360deg); } }
html.eink #loading-overlay { background: rgba(255,255,255,0.92); }
html.eink #loading-spinner { border-top-color: #000; border-color: #ccc; }
#edit-tap-prev, #edit-tap-next {
  position: absolute; top: 50%; transform: translateY(-50%);
  display: none; z-index: 10;
  background: var(--bg); color: var(--ink);
  border: 2px solid var(--border2); border-radius: var(--radius);
  font-size: 22px; font-family: var(--font-mono);
  padding: 10px 8px; cursor: pointer; line-height: 1;
  opacity: 0.85;
}
#edit-tap-prev { left: 8px; }
#edit-tap-next { right: 8px; }
#edit-tap-prev.active, #edit-tap-next.active { display: block; }
#edit-tap-prev:active, #edit-tap-next:active { opacity: 1; background: var(--bg3); }
html.eink #edit-tap-prev, html.eink #edit-tap-next { border-width: 2px; border-color: #000; }

/* Pause button in practice header */
#p-pause { background: none; border: 1px solid rgba(255,255,255,0.35); border-radius: var(--radius); padding: 5px 12px; cursor: pointer; font-family: var(--font-mono); font-size: 12px; color: rgba(255,255,255,0.8); white-space: nowrap; user-select: none; -webkit-user-select: none; }
#p-pause:hover { background: rgba(255,255,255,0.15); color: #fff; }
#p-pause.paused { background: rgba(255,255,255,0.2); color: #fff; border-color: rgba(255,255,255,0.7); }
html.eink #p-pause { border-color: #000; color: #000; }
html.eink #p-pause.paused { background: #000; color: #fff; }
#p-pause .p-play { display: none; }
#p-pause .p-stop { display: inline; }
#p-pause.paused .p-play { display: inline; }
#p-pause.paused .p-stop { display: none; }

/* Practice draw toolbar */
#p-draw-toolbar { display: none; position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
  background: var(--chrome); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px;
  padding: 6px 10px; gap: 8px; align-items: center; z-index: 15;
  box-shadow: 0 4px 16px rgba(0,0,0,0.3); touch-action: none; }
#p-draw-toolbar.show { display: flex; }
#p-draw-toolbar.dragging { transform: none; transition: none; }
#p-draw-handle { color: rgba(255,255,255,0.5); font-size: 18px; cursor: grab; padding: 0 4px; touch-action: none; user-select: none; -webkit-user-select: none; flex-shrink: 0; }
#p-draw-handle:active { cursor: grabbing; }
html.eink #p-draw-handle { color: #999; }
#p-draw-toolbar.show { display: flex; }
.p-draw-btn { background: none; border: 1px solid rgba(255,255,255,0.25); border-radius: var(--radius);
  padding: 0 12px; height: 36px; cursor: pointer; font-family: var(--font-mono); font-size: 14px;
  color: rgba(255,255,255,0.85); white-space: nowrap; }
.p-draw-btn:hover { background: rgba(255,255,255,0.15); color: #fff; }
.p-draw-btn.active { background: rgba(255,255,255,0.2); color: #fff; border-color: rgba(255,255,255,0.6); }
.p-draw-btn.practice-mode { color: #ffaaaa; border-color: rgba(255,100,100,0.5); }
.p-draw-btn.danger:hover { color: #ffaaaa; border-color: #ffaaaa; }
html.eink #p-draw-toolbar { background: #fff; border-color: #999; }
html.eink .p-draw-btn { color: #000; border-color: #999; background: #f0f0f0; }
html.eink .p-draw-btn.active { background: #000; color: #fff; }

/* Pause overlay on score */
#p-pause-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.08); display: none; align-items: center; justify-content: center; z-index: 10; pointer-events: none; }
#p-pause-overlay.show { display: flex; }
#p-pause-label { font-family: var(--font-mono); font-size: 13px; color: var(--ink2); letter-spacing: .1em; text-transform: uppercase; background: var(--bg); border: 1px solid var(--border2); padding: 8px 18px; border-radius: var(--radius); }

/* Annotation type toggle in toolbar */
#annot-type-btn { background: none; border: 1px solid rgba(255,255,255,0.25); border-radius: var(--radius); padding: 0 11px; height: var(--btn-h); cursor: pointer; font-family: var(--font-mono); font-size: 15px; color: rgba(255,255,255,0.8); white-space: nowrap; display: flex; align-items: center; gap: 5px; }
#annot-type-btn:hover { background: rgba(255,255,255,0.15); }
#annot-type-btn.practice-mode { border-color: rgba(255,100,100,0.6); color: #ffaaaa; }
html.eink #annot-type-btn { border-color: #999; color: #000; background: #f0f0f0; }
html.eink #annot-type-btn.practice-mode { background: #000; color: #fff; border-color: #000; }
html.clean-white #annot-type-btn, html.warm #annot-type-btn { color: var(--ink); border-color: var(--border2); }
html.clean-white #annot-type-btn.practice-mode, html.warm #annot-type-btn.practice-mode { color: var(--red); border-color: var(--red); }

/* Page tap zones */
#tap-prev, #tap-next { position: absolute; top: 0; bottom: 0; width: 33%; cursor: pointer; display: none; z-index: 5; }
#tap-prev { left: 0; }
#tap-next { right: 0; }
#tap-prev.active, #tap-next.active { display: block; }
#tap-prev:active { background: rgba(0,0,0,0.06); }
#tap-next:active { background: rgba(0,0,0,0.06); }

/* Group page indicator in practice screen */
#p-page-nav { display: none; align-items: center; gap: 8px; font-size: 14px; color: rgba(255,255,255,0.85); }
#p-page-nav.visible { display: flex; }
#p-page-counter { min-width: 40px; text-align: center; font-variant-numeric: tabular-nums; }
#p-page-nav .p-btn { padding: 7px 14px; font-size: 16px; }

/* Weight picker */
.weight-btns { flex-shrink: 0; }
.w-pick { font-family: var(--font-mono); font-size: 14px; color: var(--ink); background: var(--bg); border: 1px solid var(--border2); border-radius: var(--radius); padding: 4px 6px; cursor: pointer; }
html.eink .w-pick { border-color: #000; font-size: 15px; }
#p-weight { display: flex; align-items: center; gap: 6px; font-size: 14px; color: var(--ink2); }
#p-weight .w-pick { font-size: 14px; padding: 5px 8px; }

/* Practice toolbar groups */
.p-group { display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
.p-group + .p-group { border-left: 1px solid rgba(255,255,255,0.2); padding-left: 8px; margin-left: 2px; }
html.eink .p-group + .p-group { border-color: #bbb; }

/* Tier buttons in practice header */
.p-tier-btn { background: none; border: 1px solid rgba(255,255,255,0.25); border-radius: var(--radius); padding: 4px 9px; cursor: pointer; font-family: var(--font-mono); font-size: 11px; color: rgba(255,255,255,0.55); white-space: nowrap; user-select: none; -webkit-user-select: none; line-height: 1.3; }
.p-tier-btn:hover { background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.85); border-color: rgba(255,255,255,0.5); }
html.eink .p-tier-btn { border-color: #bbb; color: #555; background: #f0f0f0; }
html.eink .p-tier-btn:hover { background: #ddd; color: #000; }

/* Sidebar tier badge */
.tier-badge { font-size: 14px; line-height: 1; cursor: pointer; padding: 3px 4px; border-radius: 3px; flex-shrink: 0; user-select: none; -webkit-user-select: none; color: var(--ink3); }
.tier-badge:hover { background: var(--bg3); }
.tier-badge.tier-more { color: #2a7a50; }
.tier-badge.tier-less { color: #a05020; }
html.eink .tier-badge { color: #999; }
html.eink .tier-badge.tier-more { color: #1a5c35; }
html.eink .tier-badge.tier-less { color: #7a3010; }

/* E-ink overrides (works on any base theme) */
html.eink {
  --bg:     #ffffff;
  --bg2:    #f0f0f0;
  --bg3:    #e0e0e0;
  --chrome: #000000;
  --ink:    #000000;
  --ink2:   #222222;
  --ink3:   #444444;
  --accent2:#333333;
  --border: #000000;
  --border2:#000000;
}

/* Sidebar icon buttons (export/import) */
.s-icon-btn { background: none; border: 1.5px solid var(--border2); border-radius: var(--radius); width: 30px; height: 30px; cursor: pointer; font-size: 15px; color: var(--ink2); display: flex; align-items: center; justify-content: center; }
.s-icon-btn:hover { background: var(--bg3); color: var(--ink); }

/* Warm theme toolbar overrides */
html.warm #tool-pick { color: var(--ink); background: var(--bg); border-color: var(--border2); }
html.warm #tool-pick option { background: #fff; color: #000; }
html.warm #annot-type-btn { color: var(--ink); border-color: var(--border2); }
html.warm #annot-type-btn.practice-mode { color: var(--red); border-color: var(--red); }
</style>
</head>
<body>

<input type="file" id="file-input" accept="*/*" multiple style="position:absolute;width:0;height:0;opacity:0;pointer-events:none;">
<input type="file" id="camera-input" accept="image/*" capture="environment" style="position:absolute;width:0;height:0;opacity:0;pointer-events:none;">

<div id="topbar">
  <select id="file-action-pick">
    <option value="add">+ add file</option>
    <option value="camera">📷 camera</option>
    <option value="export">exp. library</option>
    <option value="import">imp. library</option>
  </select>
  <button id="file-action-go" class="t-btn" onclick="doFileAction()">→</button>
  <input type="file" id="import-input" accept=".json" style="display:none">
  <div class="t-sep"></div>
  <select id="tool-pick" onchange="setTool(this.value)" title="drawing tool">
    <option value="pen">pen</option>
    <option value="eraser">eraser</option>
    <option value="box">box</option>
    <option value="text">text</option>
  </select>
  <div class="t-sep"></div>
  <div id="brush-wrap">
    <button id="brush-btn" class="t-btn" onclick="toggleBrushPopover()" title="brush size & color">
      <span id="brush-preview">●</span><span id="brush-size-label"> 3</span>
    </button>
  </div>
  <button id="annot-type-btn" onclick="toggleAnnotType()" title="toggle annotation type: annotate (solid) vs practice (red/dashed)">
    <span id="annot-type-icon">●</span> <span id="annot-type-label">annotate</span>
  </button>
  <div class="t-sep"></div>
  <button class="t-btn danger" onclick="clearCanvas()">clear</button>
  <div class="t-spacer"></div>
  <div id="cleanup-normal">
    <button class="t-btn" onclick="previewCleanup()" title="binarize image for e-ink / better contrast">clarify</button>
  </div>
  <div id="cleanup-preview" style="display:none;align-items:center;gap:6px;">
    <span class="t-label">threshold</span>
    <input type="range" id="threshold-slider" min="60" max="220" value="128" step="1" oninput="updateThreshold(+this.value)">
    <span id="threshold-val" style="font-size:10px;color:rgba(255,255,255,0.5);min-width:24px;">128</span>
    <button class="t-btn active" onclick="commitCleanup()">commit</button>
    <button class="t-btn" onclick="revertCleanup()">revert</button>
  </div>
  <button class="t-btn" onclick="duplicateActive()" title="duplicate this page as new item">duplicate</button>
  <button class="t-btn" id="metro-toggle-btn" onclick="toggleMetronomePanel()" title="Compás metronome" style="padding: 0 14px;">BPM</button>
  <button class="t-btn" id="settings-btn" onclick="toggleSettings()" title="settings">⚙</button>
</div>

<!-- Settings panel -->
<div id="settings-panel">
  <div id="settings-header">
    <span id="settings-title">Settings</span>
    <button id="settings-close" onclick="toggleSettings()">✕</button>
  </div>
  <div id="settings-body">
    <div class="settings-section">
      <div class="settings-label">Theme</div>
      <select id="theme-pick" onchange="setTheme(this.value)">
        <option value="default">Ocean</option>
        <option value="warm">Warm</option>
        <option value="eink">E-ink</option>
        <option value="white">B&W</option>
        <option value="purewhite">Clean White</option>
      </select>
    </div>
    <div class="settings-section">
      <div class="settings-label">Rest Periods</div>
      <div id="rest-settings" style="display:flex; flex-direction:column; gap:10px;">
        <div class="settings-row">
          <span class="settings-field-label">rest duration</span>
          <input type="number" id="rest-dur" value="45" min="10" max="300" class="settings-input"> <span class="settings-unit">sec</span>
        </div>
        <div class="settings-row">
          <span class="settings-field-label">every</span>
          <input type="number" id="rest-every" value="5" min="1" max="20" class="settings-input"> <span class="settings-unit">items</span>
        </div>
        <div class="settings-row">
          <label class="settings-toggle">
            <input type="checkbox" id="rest-suggestions" checked>
            <span>rest suggestions</span>
          </label>
        </div>
        <div class="settings-row">
          <button class="settings-nav-btn" onclick="openCardsPanel()">Edit rest cards →</button>
        </div>
      </div>
    </div>
    <div class="settings-section">
      <div class="settings-label">Practice Session</div>
      <div style="display:flex; flex-direction:column; gap:10px;">
        <div class="settings-row">
          <span class="settings-field-label">loops</span>
          <input type="number" id="loop-count" value="3" min="1" max="99" class="settings-input">
          <label class="settings-toggle" style="margin-left:6px;">
            <input type="checkbox" id="loop-indefinite">
            <span>indefinite</span>
          </label>
        </div>
        <div class="settings-row">
          <span class="settings-field-label">random mode</span>
          <select id="random-mode" class="settings-select">
            <option value="shuffle-per-loop">shuffle per loop</option>
            <option value="full-shuffle">full shuffle</option>
          </select>
        </div>
      </div>
    </div>
  </div>

  <!-- Rest cards sub-panel (slides over settings body) -->
  <div id="cards-panel">
    <div id="cards-panel-header">
      <button id="cards-back-btn" onclick="closeCardsPanel()">← Back</button>
      <span id="cards-panel-title">Rest Cards</span>
    </div>
    <div id="cards-panel-body">
      <!-- rendered by renderCardsPanel() -->
    </div>
  </div>
</div>
<div id="settings-backdrop" onclick="toggleSettings()"></div>

<!-- Compás metronome panel -->
<div id="metro-panel">
  <div id="metro-header" title="drag to move">
    <span id="metro-title">Compás</span>
    <div id="metro-bpm-display">
      <input id="metro-bpm" type="number" min="40" max="208" value="120"
             onchange="setMetroBPMFromInput(+this.value)"
             oninput="setMetroBPMFromInput(+this.value)">
      <span id="metro-bpm-unit">bpm</span>
    </div>
    <button id="metro-close" onclick="toggleMetronomePanel()">✕</button>
  </div>
  <div id="metro-body">
    <div id="metro-dial-wrap">
      <svg id="metro-dial" viewBox="0 0 200 200" width="224" height="224">
        <!-- dial circle -->
        <circle cx="100" cy="100" r="82" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
        <!-- tick marks: 40, 82, 124, 166, 208 -->
        <line x1="42.0" y1="158.0" x2="47.7" y2="152.3" stroke="rgba(255,255,255,0.9)" stroke-width="2.5"/>
        <line x1="24.2" y1="68.6"  x2="31.6" y2="71.7"  stroke="rgba(255,255,255,0.7)" stroke-width="2"/>
        <line x1="100"  y1="18"    x2="100"  y2="26"    stroke="rgba(255,255,255,0.9)" stroke-width="2.5"/>
        <line x1="175.8" y1="68.6" x2="168.4" y2="71.7" stroke="rgba(255,255,255,0.7)" stroke-width="2"/>
        <line x1="158.0" y1="158.0" x2="152.3" y2="152.3" stroke="rgba(255,255,255,0.9)" stroke-width="2.5"/>
        <!-- small ticks generated by JS -->
        <g id="metro-small-ticks"></g>
        <!-- labels at r=60 -->
        <text x="57.6"  y="145.9" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.85)" font-family="monospace">40</text>
        <text x="44.6"  y="80.5"  text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.85)" font-family="monospace">82</text>
        <text x="100"   y="43.5"  text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.85)" font-family="monospace">124</text>
        <text x="155.4" y="80.5"  text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.85)" font-family="monospace">166</text>
        <text x="142.4" y="145.9" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.85)" font-family="monospace">208</text>
        <!-- needle -->
        <line id="metro-dial-needle" x1="100" y1="100" x2="100" y2="22"
          stroke="rgba(255,255,255,0.95)" stroke-width="2.5" stroke-linecap="round"
          transform="rotate(-135 100 100)"/>
        <circle cx="100" cy="100" r="4" fill="rgba(255,255,255,0.9)"/>
      </svg>
    </div>
    <div id="metro-beats-row">
      <div id="metro-beat-count-btns">
        <button class="metro-count-btn" onclick="toggleMetroBeats(2)">2</button>
        <button class="metro-count-btn" onclick="toggleMetroBeats(3)">3</button>
        <button class="metro-count-btn active" onclick="toggleMetroBeats(4)">4</button>
        <button class="metro-count-btn" onclick="toggleMetroBeats(5)">5</button>
        <button class="metro-count-btn" onclick="toggleMetroBeats(6)">6</button>
        <button class="metro-count-btn" onclick="toggleMetroBeats(7)">7</button>
      </div>
    </div>
    <div id="metro-accent-row"></div>
    <div id="metro-controls">
      <button id="metro-tap" onclick="metroTap()">tap</button>

let db;
const DB_NAME = 'practice_v1', DB_VER = 3, STORE = 'items', GSTORE = 'groups', RCSTORE = 'restCards';

function openDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains(STORE)) d.createObjectStore(STORE, { keyPath: 'id' });
      if (!d.objectStoreNames.contains(GSTORE)) d.createObjectStore(GSTORE, { keyPath: 'id' });
      if (!d.objectStoreNames.contains(RCSTORE)) d.createObjectStore(RCSTORE, { keyPath: 'id' });
    };
    req.onsuccess = e => { db = e.target.result; res(db); };
    req.onerror = () => rej(req.error);
  });
}
function dbPutRestCard(card) {
  return new Promise((res, rej) => {
    const tx = db.transaction(RCSTORE, 'readwrite');
    tx.objectStore(RCSTORE).put(card).onsuccess = () => res();
    tx.onerror = () => rej(tx.error);
  });
}

let boxStart = null;

// ── Tool / brush ─────────────────────────────────────────────────────────────
function setTool(t) {

  const pick = document.getElementById('tool-pick');
  if (pick) pick.value = t;

// ── Text annotation overlay ──────────────────────────────────────────────────
let _textTargetCtx = null;
let _textCanvasEl = null;
let _textSnapshot = null;   // ImageData snapshot before any text preview

function _getTextCanvasPos() {
  // Returns {x, y, scaleX, scaleY} mapping cursor screen pos to canvas coords
  const cursor = document.getElementById('text-cursor');
  const rect = _textCanvasEl.getBoundingClientRect();
  const curRect = cursor.getBoundingClientRect();
  const scaleX = _textCanvasEl.width / rect.width;
  const scaleY = _textCanvasEl.height / rect.height;
  // Baseline = top of cursor + fontSize (first line baseline)
  const canvasX = (curRect.left - rect.left) * scaleX;
  const canvasY = (curRect.top - rect.top + textFontSize * 0.82) * scaleY;
  return { canvasX, canvasY, scaleX, scaleY };
}

function _renderTextPreview() {
  if (!_textTargetCtx || !_textCanvasEl || !_textSnapshot) return;
  // Restore to pre-text state
  _textTargetCtx.putImageData(_textSnapshot, 0, 0);
  const cursor = document.getElementById('text-cursor');
  const text = cursor.innerText || '';
  if (!text) return;
  const { canvasX, canvasY, scaleX, scaleY } = _getTextCanvasPos();
  const style = getDrawStyle();
  _textTargetCtx.save();
  _textTargetCtx.font = `${textFontSize * scaleY}px Georgia, serif`;
  _textTargetCtx.fillStyle = style.color;
  _textTargetCtx.globalAlpha = 1;
  const lines = text.split('\n');
  const lineH = textFontSize * scaleY * 1.35;
  lines.forEach((line, i) => {
    _textTargetCtx.fillText(line, canvasX, canvasY + i * lineH);
  });
  _textTargetCtx.restore();
}

function adjustTextSize(delta) {
  textFontSize = Math.max(8, Math.min(72, textFontSize + delta));
  const lbl = document.getElementById('to-size-label');
  if (lbl) lbl.textContent = textFontSize;
  const cursor = document.getElementById('text-cursor');
  if (cursor) cursor.style.fontSize = textFontSize + 'px';
  _renderTextPreview();
}

function _positionControls() {
  const cursor = document.getElementById('text-cursor');
  const controls = document.getElementById('text-overlay-controls');
  if (!cursor || !controls) return;
  const curRect = cursor.getBoundingClientRect();
  const W = window.innerWidth, H = window.innerHeight;
  const ctrlH = 36;
  let top = curRect.bottom + 6;
  if (top + ctrlH > H) top = curRect.top - ctrlH - 6;
  let left = curRect.left;
  if (left + 180 > W) left = W - 186;
  controls.style.top = Math.max(4, top) + 'px';
  controls.style.left = Math.max(4, left) + 'px';
}

function showTextOverlay(screenX, screenY, ctx, canvasEl) {
  _textTargetCtx = ctx;
  _textCanvasEl = canvasEl;
  // Snapshot current canvas state
  _textSnapshot = ctx.getImageData(0, 0, canvasEl.width, canvasEl.height);

  const ov = document.getElementById('text-overlay');
  const cursor = document.getElementById('text-cursor');
  cursor.innerText = '';
  cursor.style.fontSize = textFontSize + 'px';
  cursor.style.left = screenX + 'px';
  cursor.style.top = (screenY - textFontSize * 0.15) + 'px'; // slight nudge so visual baseline matches click
  document.getElementById('to-size-label').textContent = textFontSize;
  ov.classList.add('show');
  _positionControls();
  setTimeout(() => { cursor.focus(); _positionControls(); }, 60);

  // Wire size buttons (remove old listeners first via replacement)
  const minus = document.getElementById('to-minus');
  const plus = document.getElementById('to-plus');
  const newMinus = minus.cloneNode(true);
  const newPlus = plus.cloneNode(true);
  minus.parentNode.replaceChild(newMinus, minus);
  plus.parentNode.replaceChild(newPlus, plus);
  newMinus.addEventListener('click', () => adjustTextSize(-2));
  newPlus.addEventListener('click', () => adjustTextSize(2));

  // Drag: grab the controls pill to reposition the text cursor
  const controls = document.getElementById('text-overlay-controls');
  let _dragActive = false, _dragStartX, _dragStartY, _dragOrigCursorLeft, _dragOrigCursorTop;

  function _onDragStart(e) {
    // only drag from the pill background, not its buttons
    if (e.target.classList.contains('to-btn') || e.target.classList.contains('to-size-btn')) return;
    e.preventDefault();
    _dragActive = true;
    const src = e.touches ? e.touches[0] : e;
    _dragStartX = src.clientX;
    _dragStartY = src.clientY;
    _dragOrigCursorLeft = cursor.offsetLeft;
    _dragOrigCursorTop = cursor.offsetTop;
    controls.style.cursor = 'grabbing';
    document.addEventListener('mousemove', _onDragMove);
    document.addEventListener('mouseup', _onDragEnd);
    document.addEventListener('touchmove', _onDragMove, { passive: false });
    document.addEventListener('touchend', _onDragEnd);
  }
  function _onDragMove(e) {
    if (!_dragActive) return;
    e.preventDefault();
    const src = e.touches ? e.touches[0] : e;
    const dx = src.clientX - _dragStartX;
    const dy = src.clientY - _dragStartY;
    const W = window.innerWidth, H = window.innerHeight;
    cursor.style.left = Math.max(0, Math.min(W - 40, _dragOrigCursorLeft + dx)) + 'px';
    cursor.style.top  = Math.max(0, Math.min(H - 40, _dragOrigCursorTop  + dy)) + 'px';
    _positionControls();
    _renderTextPreview();
  }
  function _onDragEnd() {
    _dragActive = false;
    controls.style.cursor = '';
    document.removeEventListener('mousemove', _onDragMove);
    document.removeEventListener('mouseup', _onDragEnd);
    document.removeEventListener('touchmove', _onDragMove);
    document.removeEventListener('touchend', _onDragEnd);
  }

  // Replace controls node to clear any previous drag listeners
  const newControls = controls.cloneNode(true);
  controls.parentNode.replaceChild(newControls, controls);
  newControls.style.cursor = 'grab';
  newControls.addEventListener('mousedown', _onDragStart);
  newControls.addEventListener('touchstart', _onDragStart, { passive: false });
  // Re-wire buttons after clone
  newControls.querySelector('#to-minus').addEventListener('click', () => adjustTextSize(-2));
  newControls.querySelector('#to-plus').addEventListener('click',  () => adjustTextSize(2));

  // Live preview on input
  cursor.oninput = () => { _renderTextPreview(); _positionControls(); };
  // Reposition controls if cursor grows
  cursor.onkeydown = (e) => {
    if (e.key === 'Escape') { cancelTextAnnotation(); e.preventDefault(); }
  };
}

function commitTextAnnotation() {
  // _renderTextPreview already has the final state on canvas — just save
  const cursor = document.getElementById('text-cursor');
  const text = cursor ? (cursor.innerText || '').trim() : '';
  if (text && _textTargetCtx) {
    // Final render to make sure it's there
    _renderTextPreview();
    if (_textCanvasEl.id === 'draw-canvas') saveAnnotation();
    else savePracticeAnnotation();
  } else if (_textSnapshot && _textTargetCtx) {
    // Nothing typed — restore snapshot
    _textTargetCtx.putImageData(_textSnapshot, 0, 0);
  }
  _closeTextOverlay();
}

function cancelTextAnnotation() {
  // Restore pre-text snapshot
  if (_textSnapshot && _textTargetCtx) {
    _textTargetCtx.putImageData(_textSnapshot, 0, 0);
  }
  _closeTextOverlay();
}

function _closeTextOverlay() {
  const ov = document.getElementById('text-overlay');
  if (ov) ov.classList.remove('show');
  const cursor = document.getElementById('text-cursor');
  if (cursor) { cursor.oninput = null; cursor.onkeydown = null; cursor.blur(); }
  _textTargetCtx = null;
  _textCanvasEl = null;
  _textSnapshot = null;
}

// ── Annotation type ──────────────────────────────────────────────────────────
function toggleAnnotType() {
  annotType = annotType === 'annotate' ? 'practice' : 'annotate';
  const btn = document.getElementById('annot-type-btn');
  const icon = document.getElementById('annot-type-icon');
  const label = document.getElementById('annot-type-label');
  const isEink = document.documentElement.classList.contains('eink');

    document.getElementById('color-pick').value = isEink ? '#1a1814' : '#8b2c2c';
  } else {
    btn.classList.remove('practice-mode');
    icon.textContent = '●';
    label.textContent = 'annotate';
    brushColor = '#1a1814';
    document.getElementById('color-pick').value = '#1a1814';
  }
  updateStatus();
  updateBrushPreview();
}

function getDrawStyle() {
  const isEink = document.documentElement.classList.contains('eink');
  return {
    color: annotType === 'practice' && !isEink ? '#8b2c2c' : brushColor,
    dashed: annotType === 'practice' && isEink
  };
}

  const groupsWithOrder = groups.map(g => ({ ...g, _type: 'group' }));

                onmousedown="event.stopPropagation()"
                ontouchstart="event.stopPropagation()">
          ${[1,1.5,2,3].map(w => `<option value="${w}" ${(entry.weight||1)===w?'selected':''}>×${w}</option>`).join('')}
        </select>
      </div>
      <div class="item-btns">
        <button class="item-btn" onclick="event.stopPropagation();openRename('${entry.id}','${entry._type}')" title="rename">✎</button>
        <button class="item-btn del" onclick="event.stopPropagation();removeEntry('${entry.id}','${entry._type}')" title="remove">✕</button>
      </div>
    </div>`;
  }).join('');
  const total = items.length + groups.length;
  document.getElementById('go-btn').disabled = total === 0;
  document.getElementById('st-count').textContent = total + ' item' + (total!==1?'s':'');
}

// ── Select mode & grouping ────────────────────────────────────────────────────
function startLongPress(id) {
  cancelLongPress();
  longPressTimer = setTimeout(() => {
    if (!selectMode) enterSelectMode();
    toggleSelect(id);
  }, 600);
}
function cancelLongPress() { clearTimeout(longPressTimer); longPressTimer = null; }

function enterSelectMode() {
  selectMode = true;
  document.body.classList.add('select-mode');
}
function deleteSelected() {
  if (selectedIds.size === 0) return;
  const count = selectedIds.size;
  if (!confirm(`Delete ${count} selected item${count !== 1 ? 's' : ''}?`)) return;
  selectedIds.forEach(id => {
    const g = groups.find(x => x.id === id);
    if (g) {
      // delete group and its private member copies
      g.itemIds.forEach(iid => { items = items.filter(i => i.id !== iid); dbDelete(iid); });
      groups = groups.filter(x => x.id !== id);
      dbDeleteGroup(id);
    } else {
      items = items.filter(i => i.id !== id);
      dbDelete(id);
    }
  });
  if (activeId && selectedIds.has(activeId)) {
    activeId = null;
    sheetImg.style.display = 'none';
    dropZone.style.display = 'flex';
    dctx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
  }
  exitSelectMode();
}

function exitSelectMode() {
  selectMode = false;
  selectedIds.clear();
  document.body.classList.remove('select-mode');
  renderSidebar();
}

function toggleSelect(id) {
  if (selectedIds.has(id)) selectedIds.delete(id);
  else selectedIds.add(id);
  renderSidebar();
}

function handleItemClick(e, id, type) {
  if (selectMode) {
    e.stopPropagation();
    toggleSelect(id);
    return;
  }
  if (type === 'item') selectItem(id);
  else selectGroup(id);
}

function selectGroup(id) {
  saveAnnotation();
  const g = groups.find(x => x.id === id);
  if (!g || !g.itemIds.length) return;
  activeId = id;
  editPageIdx = 0;
  loadEditPage();
  updateStatus();
  renderSidebar();
}

function loadEditPage() {
  const g = groups.find(x => x.id === activeId);
  if (!g) return;
  const item = items.find(i => i.id === g.itemIds[editPageIdx]);
  if (!item) return;
  sheetImg.style.display = 'block';
  dropZone.style.display = 'none';
  sheetImg.src = '';
  sheetImg.onload = () => { fitImage(); loadAnnotationForItem(item); };
  sheetImg.src = item.src;
  // show edit tap zones
  document.getElementById('edit-tap-prev').classList.toggle('active', editPageIdx > 0);
  document.getElementById('edit-tap-next').classList.toggle('active', editPageIdx < g.itemIds.length - 1);
  // update page indicator in status bar
  document.getElementById('st-tool').textContent = `page ${editPageIdx+1} / ${g.itemIds.length} · ${tool} · ${brushSize}px`;
}

function editPrevPage() {
  const g = groups.find(x => x.id === activeId);
  if (!g || editPageIdx <= 0) return;
  saveAnnotation();
  editPageIdx--;
  loadEditPage();
}

function editNextPage() {
  const g = groups.find(x => x.id === activeId);
  if (!g || editPageIdx >= g.itemIds.length - 1) return;
  saveAnnotation();
  editPageIdx++;
  loadEditPage();
}

function loadAnnotationForItem(item) {
  dctx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
  if (!item || !item.annotation) return;
  const img = new Image();
  img.onload = () => dctx.drawImage(img, 0, 0, drawCanvas.width, drawCanvas.height);
  img.src = item.annotation;
}

function createGroup() {
  if (selectedIds.size < 2) { toast('Select 2 or more items'); return; }
  const all = allLibraryItems();
  const orderedEntries = all.filter(e => selectedIds.has(e.id));
  // deep copy each selected item so group owns independent pages
  const newItemIds = orderedEntries.map(entry => {
    const orig = items.find(i => i.id === entry.id);
    if (!orig) return null;
    const copy = { ...orig, id: uid(), order: items.length, _groupMember: true };
    items.push(copy);
    dbPut(copy);
    return copy.id;
  }).filter(Boolean);
  const firstName = orderedEntries[0]?.name || 'Group';
  const g = { id: uid(), name: firstName, itemIds: newItemIds, weight: 1, sessions: 0, order: items.length + groups.length };
  groups.push(g);
  dbPutGroup(g);
  exitSelectMode();
  toast('Group created');
}

function removeEntry(id, type) {
  if (type === 'group') removeGroup(id);
  else removeItem(id);
}

function removeGroup(id) {
  const g = groups.find(x => x.id === id);
  if (!g) return;
  if (!confirm(`Remove group "${g.name}" and its ${g.itemIds.length} pages?`)) return;
  groups = groups.filter(x => x.id !== id);
  dbDeleteGroup(id);
  g.itemIds.forEach(iid => {
    items = items.filter(i => i.id !== iid);
    dbDelete(iid);
  });
  if (activeId === id) activeId = null;
  renderSidebar();
}

function duplicateGroup(id) {
  const g = groups.find(x => x.id === id);
  if (!g) return;
  // deep copy each member item
  const newItemIds = g.itemIds.map(iid => {
    const orig = items.find(i => i.id === iid);
    if (!orig) return null;
    const copy = { ...orig, id: uid(), name: orig.name, order: items.length, _groupMember: true };
    items.push(copy);
    dbPut(copy);
    return copy.id;
  }).filter(Boolean);
  const newGroup = { id: uid(), name: g.name + ' (2)', itemIds: newItemIds, weight: g.weight, sessions: 0, order: groups.length + items.length };
  groups.push(newGroup);
  dbPutGroup(newGroup);
  renderSidebar();
  toast('Group duplicated');
}

// ── Weight (updated to handle groups) ────────────────────────────────────────
function setWeight(id, type, w) {
  if (type === 'group') {
    const g = groups.find(x => x.id === id);
    if (!g) return;
    g.weight = w;
    dbPutGroup(g);
  } else {
    const item = items.find(i => i.id === id);
    if (!item) return;
    item.weight = w;
    dbPut(item);
  }
  renderSidebar();
}

function cycleTier(id, type) {
  const entry = type === 'group' ? groups.find(x => x.id === id) : items.find(i => i.id === id);
  if (!entry) return;
  const cur = entry.tier || 0;
  entry.tier = cur === 0 ? 1 : cur === 1 ? -1 : 0;
  if (type === 'group') dbPutGroup(entry); else dbPut(entry);
  const practiceEntry = queue[qIdx];
  if (practiceEntry && practiceEntry.id === id) updateTierButtons(entry.tier);
  renderSidebar();
}

function setPracticeTier(dir) {
  const entry = queue[qIdx];
  if (!entry) return;
  const cur = entry.tier || 0;
  const newTier = Math.max(-1, Math.min(1, cur + dir));
  entry.tier = newTier;
  const orig = entry._type === 'group'
    ? groups.find(x => x.id === entry.id)
    : items.find(i => i.id === entry.id);
  if (orig) {
    orig.tier = newTier;
    if (entry._type === 'group') dbPutGroup(orig); else dbPut(orig);
  }
  updateTierButtons(newTier);
  // Update just the sidebar badge for this item without full re-render
  const badge = document.querySelector(`.tier-badge[data-id="${entry.id}"]`);
  if (badge) {
    badge.textContent = newTier === 1 ? '↑' : newTier === -1 ? '↓' : '·';
    badge.className = 'tier-badge' + (newTier === 1 ? ' tier-more' : newTier === -1 ? ' tier-less' : '');
  }
}

function updateTierButtons(tier) {
  const lessBtn = document.getElementById('p-tier-less');
  const moreBtn = document.getElementById('p-tier-more');
  if (!lessBtn || !moreBtn) return;
  // tier +1: already at max, hide More (can't go higher), show Less (to come back)
  // tier -1: already at min, hide Less (can't go lower), show More (to come back)
  // tier  0: show both
  lessBtn.style.display = tier === -1 ? 'none' : 'inline-block';
  moreBtn.style.display = tier === 1  ? 'none' : 'inline-block';
}

// ── Rename (updated to handle groups) ────────────────────────────────────────
function openRename(id, type) {
  renameTargetId = id;
  renameTargetType = type || 'item';
  const entry = type === 'group' ? groups.find(g => g.id === id) : items.find(i => i.id === id);
  document.getElementById('rename-input').value = entry ? entry.name : '';
  document.getElementById('rename-modal').classList.add('show');
  setTimeout(() => document.getElementById('rename-input').select(), 50);
}

function setPracticeWeight(w) {
  const item = queue[qIdx];
  if (!item) return;
  item.weight = w;
  const orig = items.find(i => i.id === item.id);
  if (orig) { orig.weight = w; dbPut(orig); }
  timerTotal = parseInt(document.getElementById('timer-input').value) * w;
  timerLeft = timerTotal;
  timerEndAt = Date.now() + timerTotal * 1000;
  updateTimerDisplay();
  renderSidebar();
  const sel = document.getElementById('pw-select');
  if (sel) sel.value = w;
}

// ── Select / load item ───────────────────────────────────────────────────────
function selectItem(id) {
  saveAnnotation();
  activeId = id;
  editPageIdx = 0;
  // hide edit tap zones
  document.getElementById('edit-tap-prev').classList.remove('active');
  document.getElementById('edit-tap-next').classList.remove('active');
  const item = getActive();
  if (!item) return;
  sheetImg.style.display = 'block';
  dropZone.style.display = 'none';
  sheetImg.src = item.src;
  sheetImg.onload = () => { fitImage(); loadAnnotation(); };
  if (sheetImg.complete && sheetImg.naturalWidth) { fitImage(); loadAnnotation(); }
  updateStatus();
  renderSidebar();
}

function fitImage() {
  const area = canvasArea.getBoundingClientRect();
  const iw = sheetImg.naturalWidth, ih = sheetImg.naturalHeight;
  const scale = Math.min(area.width / iw, area.height / ih, 1);
  const w = Math.round(iw * scale), h = Math.round(ih * scale);
  const left = Math.round((area.width - w) / 2);
  const top  = Math.round((area.height - h) / 2);
  sheetImg.style.cssText = `display:block;width:${w}px;height:${h}px;left:${left}px;top:${top}px;position:absolute;`;
  drawCanvas.width = w; drawCanvas.height = h;
  drawCanvas.style.cssText = `left:${left}px;top:${top}px;position:absolute;`;
  drawCanvas.dataset.scale = scale;
}

function saveAnnotation() {
  const item = getActiveItem();
  if (!item) return;
  item.annotation = drawCanvas.toDataURL();
  dbPut(item);
}

function loadAnnotation() {
  dctx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
  const item = getActiveItem();
  if (!item || !item.annotation) return;
  const img = new Image();
  img.onload = () => dctx.drawImage(img, 0, 0, drawCanvas.width, drawCanvas.height);
  img.src = item.annotation;
}

function clearCanvas() {
  if (!activeId) return;
  if (!confirm('Clear all annotations on this item?')) return;
  dctx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
  saveAnnotation();
}

// ── Drawing ──────────────────────────────────────────────────────────────────
function getPos(e) {
  const rect = drawCanvas.getBoundingClientRect();
  const src = e.touches ? e.touches[0] : e;
  return { x: src.clientX - rect.left, y: src.clientY - rect.top };
}

drawCanvas.addEventListener('mousedown', startDraw);
drawCanvas.addEventListener('mousemove', doDraw);
drawCanvas.addEventListener('mouseup', endDraw);
drawCanvas.addEventListener('mouseleave', endDraw);
drawCanvas.addEventListener('touchstart', startDraw, { passive: false });
drawCanvas.addEventListener('touchmove', doDraw, { passive: false });
drawCanvas.addEventListener('touchend', endDraw);

function startDraw(e) {
  if (!activeId) return;
  e.preventDefault();
  if (tool === 'text') {
    const src = e.touches ? e.touches[0] : e;
    showTextOverlay(src.clientX, src.clientY, dctx, drawCanvas);
    return;
  }
  isDrawing = true;
  const p = getPos(e);
  lastX = p.x; lastY = p.y;
  if (tool === 'box') {
    boxStart = p;
    // snapshot current canvas so we can restore it during drag preview
    boxSnapshot = dctx.getImageData(0, 0, drawCanvas.width, drawCanvas.height);
    return;
  }
  dctx.beginPath();
  dctx.moveTo(p.x, p.y);
}

function doDraw(e) {
  if (!isDrawing) return;
  e.preventDefault();
  const p = getPos(e);
  if (tool === 'eraser') {
    const sz = brushSize * 5;
    dctx.clearRect(p.x - sz/2, p.y - sz/2, sz, sz);
  } else if (tool === 'pen') {
    const style = getDrawStyle();
    dctx.globalAlpha = 1;
    dctx.strokeStyle = style.color;
    dctx.lineWidth = brushSize * 0.65;
    dctx.lineCap = 'butt';
    dctx.lineJoin = 'miter';
    if (style.dashed) dctx.setLineDash([6, 4]);
    else dctx.setLineDash([]);
    dctx.beginPath();
    dctx.moveTo(lastX, lastY);
    dctx.lineTo(p.x, p.y);
    dctx.stroke();
    dctx.setLineDash([]);
  } else if (tool === 'box') {
    // restore snapshot then draw preview box on top
    if (boxSnapshot) dctx.putImageData(boxSnapshot, 0, 0);
    const style = getDrawStyle();
    const b = boxStart;
    dctx.strokeStyle = style.color;
    dctx.lineWidth = Math.max(1.5, brushSize * 0.5);
    dctx.setLineDash(style.dashed ? [8, 5] : [6, 4]);
    dctx.strokeRect(b.x, b.y, p.x - b.x, p.y - b.y);
    dctx.setLineDash([]);
  }
  lastX = p.x; lastY = p.y;
}

function endDraw(e) {
  if (!isDrawing) return;
  isDrawing = false;
  if (tool === 'box' && boxStart) {
    const p = getPos(e);
    // restore snapshot then draw final box
    if (boxSnapshot) dctx.putImageData(boxSnapshot, 0, 0);
    const style = getDrawStyle();
    dctx.strokeStyle = style.color;
    dctx.lineWidth = Math.max(1.5, brushSize * 0.5);
    dctx.setLineDash(style.dashed ? [8, 5] : []);
    dctx.strokeRect(boxStart.x, boxStart.y, p.x - boxStart.x, p.y - boxStart.y);
    dctx.setLineDash([]);
    boxStart = null;
    boxSnapshot = null;
  }
  saveAnnotation();
}

// ── Add items ────────────────────────────────────────────────────────────────
const MAX_PX = 1600;   // max long edge — reduced for iPad compatibility
const IMG_Q  = 0.82;   // jpeg quality

function showLoading(msg) {
  const el = document.getElementById('loading-overlay');
  document.getElementById('loading-msg').textContent = msg || 'Loading…';
  el.classList.add('show');
}
function hideLoading() {
  document.getElementById('loading-overlay').classList.remove('show');
}

// Yield to browser between heavy operations to prevent UI freeze
function yieldFrame() {
  return new Promise(res => requestAnimationFrame(res));
}

async function compressImage(src) {
  return new Promise(res => {
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(1, MAX_PX / Math.max(img.width, img.height));
      const w = Math.round(img.width * scale);
      const h = Math.round(img.height * scale);
      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      res(c.toDataURL('image/jpeg', IMG_Q));
    };
    img.src = src;
  });
}

const ALLOWED_TYPES = ['image/jpeg','image/png','image/gif','image/webp','image/heic','image/heif','application/pdf'];
const ALLOWED_EXT = ['.jpg','.jpeg','.png','.gif','.webp','.heic','.heif','.pdf'];

function isAllowedFile(file) {
  if (ALLOWED_TYPES.includes(file.type)) return true;
  const name = file.name.toLowerCase();
  return ALLOWED_EXT.some(ext => name.endsWith(ext));
}

async function handleFiles(files, namePrefix) {
  // validate all files first
  const rejected = [];
  const accepted = [];
  for (const file of files) {
    if (isAllowedFile(file)) accepted.push(file);
    else rejected.push(file.name);
  }
  if (rejected.length) {
    const msg = rejected.length === 1
      ? `"${rejected[0]}" is not a supported file type.\n\nSupported: JPG, PNG, GIF, WEBP, PDF`
      : `${rejected.length} files are not supported:\n${rejected.join('\n')}\n\nSupported: JPG, PNG, GIF, WEBP, PDF`;
    alert(msg);
    if (!accepted.length) return;
  }
  if (!accepted.length) return;
  showLoading('Preparing…');
  await yieldFrame();
  for (const file of accepted) {
    const base = namePrefix || file.name.replace(/\.[^/.]+$/, '');
    if (file.type === 'application/pdf' && pdfjsLib) {
      showLoading('Loading PDF…');
      await yieldFrame();
      const ab = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: ab }).promise;
      for (let p = 1; p <= pdf.numPages; p++) {
        showLoading(`Page ${p} of ${pdf.numPages}…`);
        await yieldFrame();
        const page = await pdf.getPage(p);
        const vp = page.getViewport({ scale: 1.5 }); // reduced from 2.0
        const c = document.createElement('canvas');
        c.width = vp.width; c.height = vp.height;
        await page.render({ canvasContext: c.getContext('2d'), viewport: vp }).promise;
        await yieldFrame();
        const name = pdf.numPages > 1 ? `${base} p.${p}` : base;
        await addItem(c.toDataURL('image/jpeg', IMG_Q), name);
        await yieldFrame();
        // release canvas memory
        c.width = 0; c.height = 0;
      }
    } else {
      showLoading('Processing image…');
      await yieldFrame();
      const raw = await readFile(file);
      await yieldFrame();
      const src = await compressImage(raw);
      await yieldFrame();
      await addItem(src, base);
    }
  }
  hideLoading();
}

document.getElementById('file-input').addEventListener('change', async e => {
  await handleFiles(e.target.files);
  e.target.value = '';
});

document.getElementById('camera-input').addEventListener('change', async e => {
  const file = e.target.files[0];
  if (!file) return;
  const name = 'photo ' + new Date().toLocaleDateString('en-US', { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
  await handleFiles([file], name);
  e.target.value = '';
});

function readFile(file) {
  return new Promise(res => {
    const r = new FileReader();
    r.onload = () => res(r.result);
    r.readAsDataURL(file);
  });
}

async function addItem(src, name) {
  const visibleCount = items.filter(i => !i._groupMember).length + groups.length;
  const item = { id: uid(), name, src, annotation: null, sessions: 0, order: visibleCount };
  items.push(item);
  await dbPut(item);
  selectItem(item.id);
  renderSidebar();
  toast('Added: ' + name);
}

function removeItem(id) {
  if (!confirm('Remove this item?')) return;
  items = items.filter(i => i.id !== id);
  dbDelete(id);
  if (activeId === id) {
    activeId = items.length ? items[0].id : null;
    if (activeId) selectItem(activeId);
    else {
      sheetImg.style.display = 'none';
      dropZone.style.display = 'flex';
      dctx.clearRect(0,0,drawCanvas.width,drawCanvas.height);
    }
  }
  renderSidebar();
}

function duplicateActive() {
  if (!activeId) return;
  const g = groups.find(x => x.id === activeId);
  if (g) { duplicateGroup(g.id); return; }
  const item = getActive();
  if (!item) return;
  saveAnnotation();
  const copy = { id: uid(), name: item.name + ' (2)', src: item.src, annotation: item.annotation, sessions: 0, order: items.length + groups.length };
  items.push(copy);
  dbPut(copy);
  selectItem(copy.id);
  renderSidebar();
  toast('Duplicated');
}

// ── Rename ───────────────────────────────────────────────────────────────────
function closeRename() {
  document.getElementById('rename-modal').classList.remove('show');
  renameTargetId = null;
}
function confirmRename() {
  const name = document.getElementById('rename-input').value.trim();
  if (!name) { closeRename(); return; }
  if (renameTargetType === 'group') {
    const g = groups.find(x => x.id === renameTargetId);
    if (g) { g.name = name; dbPutGroup(g); }
  } else {
    const item = items.find(i => i.id === renameTargetId);
    if (item) { item.name = name; dbPut(item); }
  }
  renderSidebar();
  updateStatus();
  closeRename();
}
document.getElementById('rename-input').addEventListener('keydown', e => { if (e.key === 'Enter') confirmRename(); if (e.key === 'Escape') closeRename(); });

// ── Drag-to-reorder (pointer events — works on touch + mouse) ────────────────
let reorderState = null; // { fromIdx, ghost, offsetY }

function commitReorder(fromIdx, toIdx) {
  if (isNaN(toIdx) || toIdx === fromIdx) return;
  const all = allLibraryItems();
  const moved = all.splice(fromIdx, 1)[0];
  all.splice(toIdx, 0, moved);
  all.forEach((entry, i) => {
    if (entry._type === 'group') {
      const orig = groups.find(g => g.id === entry.id);
      if (orig) { orig.order = i; dbPutGroup(orig); }
    } else {
      const orig = items.find(x => x.id === entry.id);
      if (orig) { orig.order = i; dbPut(orig); }
    }
  });
  renderSidebar();
}

function initDragContainer() {
  const list = document.getElementById('item-list');

  function startReorder(clientY, fromIdx, row) {
    cancelLongPress();
    const rect = row.getBoundingClientRect();
    const ghost = row.cloneNode(true);
    ghost.style.cssText = `position:fixed;left:${rect.left}px;top:${rect.top}px;width:${rect.width}px;
      opacity:0.85;pointer-events:none;z-index:1000;box-shadow:0 4px 16px rgba(0,0,0,0.25);
      background:var(--bg);border:2px solid var(--ink);border-radius:var(--radius);`;
    document.body.appendChild(ghost);
    row.style.opacity = '0.3';
    reorderState = { fromIdx, ghost, sourceRow: row, offsetY: clientY - rect.top, toIdx: fromIdx };
  }

  function moveReorder(clientY) {
    if (!reorderState) return;
    const { ghost, offsetY } = reorderState;
    const listRect = list.getBoundingClientRect();
    const newTop = Math.max(listRect.top, Math.min(clientY - offsetY, listRect.bottom - 40));
    ghost.style.top = newTop + 'px';
    document.querySelectorAll('.item').forEach(el => el.classList.remove('drag-over'));
    const els = Array.from(list.querySelectorAll('.item'));
    for (const el of els) {
      const r = el.getBoundingClientRect();
      if (clientY >= r.top && clientY <= r.bottom) {
        const idx = parseInt(el.dataset.idx);
        if (!isNaN(idx) && idx !== reorderState.fromIdx) el.classList.add('drag-over');
        reorderState.toIdx = isNaN(idx) ? reorderState.fromIdx : idx;
        break;
      }
    }
  }

  function endReorder() {
    if (!reorderState) return;
    const { ghost, sourceRow, fromIdx, toIdx } = reorderState;
    ghost.remove();
    sourceRow.style.opacity = '';
    document.querySelectorAll('.item').forEach(el => el.classList.remove('drag-over'));
    reorderState = null;
    commitReorder(fromIdx, toIdx);
  }

  // Touch events (most reliable on mobile/tablet)
  list.addEventListener('touchstart', e => {
    const handle = e.target.closest('.item-drag');
    if (!handle) return;
    const row = handle.closest('.item');
    if (!row) return;
    const fromIdx = parseInt(row.dataset.idx);
    if (isNaN(fromIdx)) return;
    e.preventDefault();
    startReorder(e.touches[0].clientY, fromIdx, row);
  }, { passive: false });

  document.addEventListener('touchmove', e => {
    if (!reorderState) return;
    e.preventDefault();
    moveReorder(e.touches[0].clientY);
  }, { passive: false });

  document.addEventListener('touchend', endReorder);
  document.addEventListener('touchcancel', endReorder);

  // Mouse fallback for desktop
  list.addEventListener('mousedown', e => {
    const handle = e.target.closest('.item-drag');
    if (!handle) return;
    const row = handle.closest('.item');
    if (!row) return;
    const fromIdx = parseInt(row.dataset.idx);
    if (isNaN(fromIdx)) return;
    e.preventDefault();
    startReorder(e.clientY, fromIdx, row);
  });

  document.addEventListener('mousemove', e => {
    if (!reorderState) return;
    moveReorder(e.clientY);
  });

  document.addEventListener('mouseup', endReorder);
}
